name: Cloud Android Phone (WebRTC - ScreenStream)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  phone:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. Install dependencies & kernel modules
      # ------------------------------------------------------------
      - name: Install ADB and kernel modules
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb linux-modules-extra-$(uname -r)

      - name: Load kernel modules
        run: |
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe ashmem_linux || true

      # ------------------------------------------------------------
      # 2. Session persistence (restore)
      # ------------------------------------------------------------
      - name: Restore session data (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Restore session data (push)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            tar -xzf ./android-data/data.tar.gz -C ./android-data/
            rm -f ./android-data/data.tar.gz
          fi

      # ------------------------------------------------------------
      # 3. Create the setup script
      # ------------------------------------------------------------
      - name: Create setup script
        run: |
          cat > setup.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          echo "================================================"
          echo "📱 STARTING REDROID WITH SCREENSTREAM (WebRTC)"
          echo "================================================"

          # --------------------------------------------
          # Start Redroid
          # --------------------------------------------
          docker run -d --name redroid \
            --privileged \
            -v $(pwd)/android-data:/data \
            -p 5555:5555 \
            redroid/redroid:14.0.0_64only-latest \
            androidboot.redroid_gpu_mode=guest \
            androidboot.redroid_width=1080 \
            androidboot.redroid_height=2400 \
            androidboot.redroid_dpi=420 \
            androidboot.redroid_fps=60 \
            androidboot.use_memfd=true

          echo "⏳ Waiting for Redroid to boot..."
          sleep 30

          adb kill-server
          adb start-server

          for i in {1..30}; do
            if adb connect localhost:5555 2>/dev/null | grep -q 'connected'; then
              echo "✅ ADB connected"
              break
            fi
            sleep 5
          done

          for i in {1..30}; do
            if adb -s localhost:5555 shell "echo ready" 2>/dev/null | grep -q "ready"; then
              echo "✅ Device ready"
              break
            fi
            sleep 5
          done

          # --------------------------------------------
          # Enable ARM translation
          # --------------------------------------------
          adb -s localhost:5555 shell setprop persist.sys.nativebridge 1
          adb -s localhost:5555 shell setprop persist.sys.nativebridge.enable 1

          # --------------------------------------------
          # Download and install ScreenStream (Google Play version)
          # Source: https://github.com/dkrivoruchko/ScreenStream/releases/tag/4.4.2
          # This is the Play Store version which supports WebRTC (Global mode)
          # --------------------------------------------
          echo "📥 Downloading ScreenStream 4.4.2 (PlayStore) from GitHub..."
          wget -O screenstream.apk \
            "https://github.com/dkrivoruchko/ScreenStream/releases/download/4.4.2/ScreenStream-PlayStore-44002.apk"

          adb -s localhost:5555 install screenstream.apk

          # --------------------------------------------
          # Launch ScreenStream
          # --------------------------------------------
          echo "📱 Launching ScreenStream..."
          adb -s localhost:5555 shell monkey -p info.dvkr.screenstream 1

          echo ""
          echo "================================================"
          echo "📱 ACTION REQUIRED: START THE STREAM"
          echo "================================================"
          echo ""
          echo "ScreenStream is now installed and launched."
          echo ""
          echo "To start the WebRTC stream:"
          echo "  1. On the phone screen, you should see the ScreenStream app."
          echo "  2. Tap the 'Start' button (or the 'Global' option)."
          echo "  3. Grant any permissions requested (screen recording, etc.)."
          echo "  4. The app will display a Stream URL."
          echo ""
          echo "Once the stream is started, the URL will be displayed in the app."
          echo ""
          echo "📝 The stream URL will look like:"
          echo "   https://screenstream.io/stream/XXXXX"
          echo ""
          echo "🔗 You can also access the phone via ADB:"
          echo "   adb connect localhost:5555"
          echo "   scrcpy -s localhost:5555"
          echo ""
          echo "================================================"
          echo ""
          echo "⏳ Press Enter once you have started the stream..."
          read -p "Press Enter to continue..."

          # --------------------------------------------
          # Get the stream URL from logcat
          # --------------------------------------------
          STREAM_URL=$(adb -s localhost:5555 logcat -d | grep -o 'https://screenstream.io/stream/[^ ]*' | head -1)

          if [ -z "$STREAM_URL" ]; then
            echo "⚠️ Could not auto-detect stream URL."
            echo "📱 Please manually copy the URL from the app screen."
            echo ""
            echo "📝 Enter the Stream URL (e.g., https://screenstream.io/stream/XXXXX):"
            read -p "Stream URL: " STREAM_URL
          else
            echo "✅ WebRTC Stream URL detected: $STREAM_URL"
          fi

          # --------------------------------------------
          # NPort tunnel for ADB fallback
          # --------------------------------------------
          echo "🔗 Starting NPort tunnel for ADB fallback..."
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          npx nport 5555 -s cloud-phone-adb --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          NPORT_PID=$!
          echo $NPORT_PID > nport.pid

          echo "⏳ Waiting for tunnel to be live..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://cloud-phone-adb.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://cloud-phone-adb.nport.link"

          # --------------------------------------------
          # Display info
          # --------------------------------------------
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY (WebRTC)"
          echo "================================================"
          echo "📱 Android 14 (64-bit) with WebRTC streaming"
          echo "📱 WebRTC Stream: $STREAM_URL"
          echo "   (Open in any WebRTC-enabled browser)"
          echo ""
          echo "🔌 ADB Fallback (via NPort): $TUNNEL_URL"
          echo "🔑 Auth: admin:$AUTH_PASS"
          echo "================================================"
          echo ""
          echo "To use ADB locally:"
          echo "  adb connect $TUNNEL_URL:5555"
          echo "  scrcpy -s $TUNNEL_URL:5555"
          echo ""
          echo "================================================"

          # --------------------------------------------
          # Keep alive
          # --------------------------------------------
          echo "⏳ Keeping phone alive for 340 minutes..."
          sleep 340m
          SCRIPT

          chmod +x setup.sh

      # ------------------------------------------------------------
      # 4. Run the setup
      # ------------------------------------------------------------
      - name: Run Redroid setup
        run: bash setup.sh

      # ------------------------------------------------------------
      # 5. Save session (fix permission issue)
      # ------------------------------------------------------------
      - name: Save session
        if: always()
        run: |
          if [ -d ./android-data ]; then
            sudo chown -R $(id -u):$(id -g) ./android-data 2>/dev/null || true
            sudo chmod -R 755 ./android-data 2>/dev/null || true
          fi

          if [ -d ./android-data ] && [ "$(ls -A ./android-data 2>/dev/null)" ]; then
            echo "📦 Creating backup..."
            tar -czf data.tar.gz -C ./android-data . || true
            if [ -f data.tar.gz ]; then
              mv data.tar.gz ./android-data/
              echo "✅ Backup created"
            else
              echo "⚠️ Backup failed"
            fi
          else
            echo "⚠️ No data to save"
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/*
          retention-days: 90

      # ------------------------------------------------------------
      # 6. Cleanup
      # ------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop redroid 2>/dev/null || true
          docker rm redroid 2>/dev/null || true
          sudo rm -rf ./android-data 2>/dev/null || true
