name: Cloud Android Phone (ws-scrcpy-web)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  phone:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      # ------------------------------------------------------------
      # 1. Install dependencies & kernel modules
      # ------------------------------------------------------------
      - name: Install ADB and kernel modules
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb linux-modules-extra-$(uname -r)

      - name: Load kernel modules
        run: |
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe ashmem_linux || true

      # ------------------------------------------------------------
      # 2. Session persistence (restore)
      # ------------------------------------------------------------
      - name: Restore session data (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Restore session data (push)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            tar -xzf ./android-data/data.tar.gz -C ./android-data/
            rm -f ./android-data/data.tar.gz
          fi

      # ------------------------------------------------------------
      # 3. Create the setup script (using ws-scrcpy-web)
      # ------------------------------------------------------------
      - name: Create setup script
        run: |
          cat > setup.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          echo "================================================"
          echo "📱 STARTING REDROID WITH WS-SCRCPY-WEB"
          echo "================================================"

          # --------------------------------------------
          # Start Redroid
          # --------------------------------------------
          docker run -d --name redroid \
            --privileged \
            -v $(pwd)/android-data:/data \
            -p 5555:5555 \
            redroid/redroid:14.0.0_64only-latest \
            androidboot.redroid_gpu_mode=guest \
            androidboot.redroid_width=1080 \
            androidboot.redroid_height=2400 \
            androidboot.redroid_dpi=420 \
            androidboot.redroid_fps=60 \
            androidboot.use_memfd=true

          echo "⏳ Waiting for Redroid to boot..."
          sleep 30

          adb kill-server
          adb start-server

          for i in {1..30}; do
            if adb connect localhost:5555 2>/dev/null | grep -q 'connected'; then
              echo "✅ ADB connected"
              break
            fi
            sleep 5
          done

          for i in {1..30}; do
            if adb -s localhost:5555 shell "echo ready" 2>/dev/null | grep -q "ready"; then
              echo "✅ Device ready"
              break
            fi
            sleep 5
          done

          # --------------------------------------------
          # Enable ARM translation (for app compatibility)
          # --------------------------------------------
          adb -s localhost:5555 shell setprop persist.sys.nativebridge 1
          adb -s localhost:5555 shell setprop persist.sys.nativebridge.enable 1

          # --------------------------------------------
          # Start ws-scrcpy-web (WebSocket + WebCodecs)
          # This is the most reliable browser UI for Redroid.
          # It uses H.264/H.265 streaming via WebSocket.
          # --------------------------------------------
          echo "📱 Starting ws-scrcpy-web on port 8000..."
          docker run -d --name ws-scrcpy \
            --network host \
            --privileged \
            bilbospocketses/ws-scrcpy-web:latest \
            sh -c "
              for i in {1..30}; do
                if adb connect localhost:5555 2>/dev/null | grep -q 'connected'; then
                  break
                fi
                sleep 2
              done
              npm start
            "

          echo "⏳ Waiting for web server on port 8000..."
          for i in {1..40}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200"; then
              echo "✅ Web server ready"
              break
            fi
            sleep 3
          done

          docker logs ws-scrcpy --tail 20

          # --------------------------------------------
          # NPort tunnel with authentication
          # --------------------------------------------
          echo "🔗 Starting NPort tunnel..."
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          npx nport 8000 -s cloud-phone --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          NPORT_PID=$!
          echo $NPORT_PID > nport.pid

          echo "⏳ Waiting for tunnel to be live..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://cloud-phone.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://cloud-phone.nport.link"

          # --------------------------------------------
          # Display info
          # --------------------------------------------
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Android 14 (64-bit) with ws-scrcpy-web"
          echo "📱 Web Interface: $TUNNEL_URL"
          echo "🔑 Auth: admin:$AUTH_PASS"
          echo "🔌 ADB (fallback): $TUNNEL_URL:5555"
          echo "================================================"
          echo "To control the phone:"
          echo "  Open $TUNNEL_URL in your browser"
          echo "  Log in with admin:$AUTH_PASS"
          echo "  You will see the Android screen."
          echo ""
          echo "To use ADB locally:"
          echo "  adb connect $TUNNEL_URL:5555"
          echo "  scrcpy -s $TUNNEL_URL:5555"
          echo "================================================"

          # --------------------------------------------
          # Keep alive
          # --------------------------------------------
          echo "⏳ Keeping phone alive for 340 minutes..."
          sleep 340m
          SCRIPT

          chmod +x setup.sh

      # ------------------------------------------------------------
      # 4. Run the setup
      # ------------------------------------------------------------
      - name: Run Redroid setup
        run: bash setup.sh

      # ------------------------------------------------------------
      # 5. Save session (fix permission issue)
      # ------------------------------------------------------------
      - name: Save session
        if: always()
        run: |
          # Fix permissions: the android-data directory may be owned by root
          # because the container writes as root. We'll copy it to a temp location.
          if [ -d ./android-data ] && [ "$(sudo ls -A ./android-data 2>/dev/null)" ]; then
            echo "📦 Creating backup..."
            # Use sudo to read the directory, then compress
            sudo tar -czf data.tar.gz -C ./android-data . || true
            if [ -f data.tar.gz ]; then
              sudo mv data.tar.gz ./android-data/
              sudo chown $(id -u):$(id -g) ./android-data/data.tar.gz
              echo "✅ Backup created"
            else
              echo "⚠️ Backup failed"
            fi
          else
            echo "⚠️ No data to save"
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/*
          retention-days: 90

      # ------------------------------------------------------------
      # 6. Cleanup
      # ------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop redroid ws-scrcpy 2>/dev/null || true
          docker rm redroid ws-scrcpy 2>/dev/null || true
          sudo rm -rf ./android-data 2>/dev/null || true
