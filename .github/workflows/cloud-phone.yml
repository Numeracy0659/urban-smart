          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://urban-phone.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://urban-phone.nport.link"
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------------
      # 9. Display connection info (visible to the user)
      # ------------------------------------------------------------------
      - name: Display info
        run: |
          echo "================================================"
          echo "🌐 CLOUD PHONE IS READY"
          echo "================================================"
          echo "📱 Web Interface: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔑 Auth: admin:${{ steps.tunnel.outputs.auth-pass }}"
          echo "🔌 ADB (fallback): ${{ steps.tunnel.outputs.tunnel-url }}:5555"
          echo "================================================"
          echo "To use ADB locally:"
          echo "  adb connect ${{ steps.tunnel.outputs.tunnel-url }}:5555"

      # ------------------------------------------------------------------
      # 10. Keep alive (355 minutes, GitHub max is 360)
      # ------------------------------------------------------------------
      - name: Keep alive
        run: sleep 355m

      # ------------------------------------------------------------------
      # 11. Save session (encrypted and compressed)
      # ------------------------------------------------------------------
      - name: Save session
        if: always()
        run: |
          if docker ps -a --filter "name=android-emulator" --format '{{.Names}}' | grep -q android-emulator; then
            echo "📦 Saving session..."
            # Compress the entire emulator data directory
            tar -czf data.tar.gz -C ./android-data .
            if [ "${{ github.event.inputs.encrypt == 'yes' }}" == "true" ]; then
              gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -c data.tar.gz
              mv data.tar.gz.gpg ./android-data/
            else
              mv data.tar.gz ./android-data/
            fi
            echo "✅ Session saved"
          else
            echo "⚠️ Emulator not running, skipping save"
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/data.tar.gz*
          retention-days: 90

      # ------------------------------------------------------------------
      # 12. Cleanup (always runs)
      # ------------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop ws-scrcpy android-emulator 2>/dev/null || true
          docker rm ws-scrcpy android-emulator 2>/dev/null || true
