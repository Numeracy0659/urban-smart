###############################################################################
#  Cloud Android Phone v3.0 — Production Build
#  Uses ReactiveCircus android-emulator-runner for reliable KVM acceleration
#  Apps: Termux, F-Droid, Firefox, Kiwi, ScreenStream + Frida + Tools
###############################################################################
name: Cloud Android Phone v3

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: start or stop the cloud phone'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
      resolution:
        description: 'Screen Resolution (WxH)'
        required: false
        default: '1080x2400'
      ram_mb:
        description: 'RAM in MB'
        required: false
        default: '4096'
      api_level:
        description: 'Android API Level'
        required: false
        default: '34'
      session_hours:
        description: 'Max Session Duration (hours)'
        required: false
        default: '6'

permissions:
  contents: read

jobs:
  setup-and-run:
    name: Start Cloud Phone
    if: github.event.inputs.action == 'start'
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      # ─────────────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      - name: Enable KVM Hardware Acceleration
        run: |
          echo "=== Enabling KVM ==="
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm
          echo "✅ KVM enabled"

      # ─────────────────────────────────────────────────────────────────────
      - name: Install ADB & Platform Tools
        run: |
          echo "=== Installing Android SDK Platform Tools ==="
          sudo apt-get update -qq
          sudo apt-get install -y -qq android-tools-adb android-tools-fastboot
          adb version
          echo "✅ ADB installed"

      # ─────────────────────────────────────────────────────────────────────
      - name: Start Android Emulator & Setup
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: ${{ github.event.inputs.api_level }}
          arch: x86_64
          profile: pixel_6_pro
          ram-size: ${{ github.event.inputs.ram_mb }}M
          disk-size: 4G
          heap-size: 512M
          force-avd-creation: false
          emulator-options: -no-snapshot-save -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none
          disable-animations: true
          boot-timeout: 900
          script: |
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║     CLOUD ANDROID PHONE v3.0 — SETUP IN PROGRESS       ║"
            echo "╚══════════════════════════════════════════════════════════╝"

            ADB="adb shell"
            ADBP="adb push"

            # ── System Info & Root ───────────────────────────────────────
            echo "=== System Information ==="
            $ADB "getprop ro.build.version.release"
            $ADB "getprop ro.build.version.sdk"
            $ADB "getprop ro.product.cpu.abilist"
            echo ""

            echo "=== Memory ==="
            $ADB "cat /proc/meminfo | head -5"
            echo ""

            echo "=== Disk ==="
            $ADB "df -h /data"
            echo ""

            # ── Root Verification ───────────────────────────────────────
            echo "=== Root Check ==="
            $ADB "cat /proc/self/status | grep Uid"
            $ADB "ls -la /system/xbin/su 2>/dev/null || ls -la /system/bin/su 2>/dev/null || echo 'su not found in standard paths'"
            $ADB "ls -la /system/xbin/magisk 2>/dev/null || ls -la /data/adb/magisk/magisk 2>/dev/null || echo 'Magisk check done'"
            echo ""

            # ── Performance Optimizations ────────────────────────────────
            echo "=== Performance Optimizations ==="
            $ADB "settings put global window_animation_scale 0"
            $ADB "settings put global transition_animation_scale 0"
            $ADB "settings put global animator_duration_scale 0"
            $ADB "settings put system screen_off_timeout 2147483647"
            $ADB "settings put secure show_ime_with_hard_keyboard 1"
            $ADB "settings put global development_settings_enabled 1"
            $ADB "settings put secure install_non_market_apps 1"
            echo "✅ Optimizations applied"
            echo ""

            # ── Enable screen sharing permissions ────────────────────────
            echo "=== Enable Screen Sharing ==="
            $ADB "settings put secure enabled_accessibility_services com.github.dkrivoruchko.screenstream/.ScreenRecordingService" 2>/dev/null || true
            $ADB "settings put secure accessibility_enabled 1" 2>/dev/null || true
            echo "✅ Screen sharing prepared"
            echo ""

            # ── Install Frida Server ─────────────────────────────────────
            echo "=== Installing Frida Server v17.16.4 ==="
            FRIDA_URL="https://github.com/frida/frida/releases/download/17.16.4/frida-server-17.16.4-android-x86_64.xz"
            curl -L -o /tmp/frida-server.xz "${FRIDA_URL}" 2>&1

            FRIDA_SIZE=$(stat -c%s /tmp/frida-server.xz 2>/dev/null || echo 0)
            echo "Downloaded: ${FRIDA_SIZE} bytes"

            if [ "${FRIDA_SIZE}" -gt 100000 ]; then
              xz -d /tmp/frida-server.xz -c > /tmp/frida-server
              chmod +x /tmp/frida-server
              echo "✅ Frida binary ready"

              adb push /tmp/frida-server /data/local/tmp/frida-server
              adb shell "chmod 755 /data/local/tmp/frida-server"

              # Start frida-server
              adb shell "nohup /data/local/tmp/frida-server -l 0.0.0.0 > /dev/null 2>&1 &"
              sleep 3

              # Verify
              F_PID=$(adb shell "pidof frida-server" 2>/dev/null)
              if [ -n "${F_PID}" ]; then
                echo "✅ Frida server RUNNING (PID: ${F_PID})"
              else
                echo "⚠️ Checking frida process..."
                adb shell "ps -A | grep frida" || true
              fi
            else
              echo "::warning::Frida download failed"
            fi
            echo ""

            # ── Download APKs ───────────────────────────────────────────
            echo "=== Downloading APKs ==="

            # Termux
            echo "  Downloading Termux v0.118.3..."
            curl -L -o /tmp/termux.apk "https://github.com/termux/termux-app/releases/download/v0.118.3/termux-app_v0.118.3%2Bgithub-debug_x86_64.apk" 2>&1

            # Termux:Boot
            curl -L -o /tmp/termux-boot.apk "https://github.com/termux/termux-boot/releases/download/v0.8.1/termux-boot-app_v0.8.1%2Bgithub.debug.apk" 2>&1

            # Termux:API
            curl -L -o /tmp/termux-api.apk "https://github.com/termux/termux-api/releases/download/v0.53.0/termux-api-app_v0.53.0%2Bgithub.debug.apk" 2>&1

            # F-Droid
            echo "  Downloading F-Droid v1.18.0..."
            curl -L -o /tmp/fdroid.apk "https://github.com/f-droid/fdroidclient/releases/download/1.18.0/org.fdroid.fdroid_1018050.apk" 2>&1

            # ScreenStream
            echo "  Downloading ScreenStream v4.4.2..."
            curl -L -o /tmp/screenstream.apk "https://github.com/dkrivoruchko/ScreenStream/releases/download/4.4.2/ScreenStream-PlayStore-44002.apk" 2>&1

            # Firefox
            echo "  Downloading Firefox v110..."
            curl -L -o /tmp/firefox.apk "https://github.com/mozilla-mobile/fenix/releases/download/v110.0.1/fenix-110.0.1-x86.apk" 2>&1

            # Kiwi Browser
            echo "  Downloading Kiwi Browser..."
            curl -L -o /tmp/kiwi.apk "https://github.com/kiwibrowser/src.next/releases/download/14310011181/com.kiwibrowser.browser-x86-14310011181-github.apk" 2>&1

            echo "✅ All APKs downloaded"
            ls -lh /tmp/*.apk
            echo ""

            # ── Install APKs ────────────────────────────────────────────
            echo "=== Installing APKs ==="

            for apk in termux termux-boot termux-api fdroid screenstream firefox kiwi; do
              apk_path="/tmp/${apk}.apk"
              size=$(stat -c%s "${apk_path}" 2>/dev/null || echo 0)
              if [ "${size}" -gt 100000 ]; then
                echo "  Installing ${apk}..."
                adb install -r "${apk_path}" 2>&1
                echo "  ✅ ${apk} installed"
              else
                echo "  ⚠️ ${apk}: download failed (size: ${size})"
              fi
            done

            echo ""
            echo "=== Installed Packages ==="
            adb shell "pm list packages | grep -iE 'termux|fdroid|screenstream|firefox|kiwi'"
            echo ""

            # ── Configure Permissions ────────────────────────────────────
            echo "=== Configuring Permissions ==="
            adb shell "appops set com.github.dkrivoruchko.screenstream SYSTEM_ALERT_WINDOW allow" 2>/dev/null || true
            adb shell "pm grant com.github.dkrivoruchko.screenstream android.permission.CAMERA" 2>/dev/null || true
            adb shell "pm grant com.github.dkrivoruchko.screenstream android.permission.RECORD_AUDIO" 2>/dev/null || true
            adb shell "dumpsys deviceidle whitelist +com.termux" 2>/dev/null || true
            echo "✅ Permissions configured"

            # Launch Termux
            adb shell "am start -n com.termux/.activity.TermuxActivity" 2>/dev/null || true
            echo "✅ Termux launched"
            echo ""

            # ── Install Termux Packages ──────────────────────────────────
            echo "=== Installing Termux Packages ==="

            # Wait for Termux to initialize
            sleep 15

            # Create a setup script
            cat > /tmp/setup_termux.sh << 'TERMUX_SCRIPT'
            #!/bin/bash
            export HOME=/data/data/com.termux/files/home
            export PREFIX=/data/data/com.termux/files/usr

            echo "Updating repositories..."
            apt update -y 2>&1 | tail -3

            echo "Installing development tools..."
            apt install -y \
              python3 python-pip \
              nodejs \
              git \
              curl wget \
              openssh \
              nano vim \
              tmux \
              htop \
              gcc clang \
              make \
              cmake \
              2>&1 | tail -3

            echo "Installing network tools..."
            apt install -y \
              nmap \
              tcpdump \
              net-tools \
              ncat \
              proxychains-ng \
              ipcalc \
              whois \
              dnsutils \
              jq \
              httpie \
              neofetch \
              tree \
              2>&1 | tail -3

            echo "Installing pentesting tools..."
            pip install \
              frida-tools \
              mitmproxy \
              sqlmap \
              scapy \
              paramiko \
              pwntools \
              requests \
              beautifulsoup4 \
              lxml \
              gobuster \
              dirsearch \
              sublist3r \
              2>&1 | tail -3

            echo "Setting up boot scripts..."
            mkdir -p ~/.termux/boot
            cat > ~/.termux/boot/start-frida << EOF
            #!/data/data/com.termux/files/usr/bin/sh
            su -c nohup /data/local/tmp/frida-server -l 0.0.0.0 &
            EOF
            chmod +x ~/.termux/boot/start-frida

            cat > ~/.termux/termux.properties << EOF
            extra-keys = [['ESC','TAB','CTRL','ALT','-','/','|','BKSP'],['UP','LEFT','RIGHT','DOWN','HOME','END','PGUP','PGDN']]
            allow-external-apps=true
            open-url-using-always=true
            use-fullscreen-workaround=true
            EOF

            echo "✅ Termux setup complete"
            TERMUX_SCRIPT

            adb push /tmp/setup_termux.sh /data/local/tmp/setup_termux.sh

            # Run via run-as
            adb shell "run-as com.termux files/usr/bin/bash -c 'chmod +x /data/local/tmp/setup_termux.sh && cp /data/local/tmp/setup_termux.sh /data/data/com.termux/files/home/setup_termux.sh && bash /data/data/com.termux/files/home/setup_termux.sh'" 2>&1
            echo ""
            echo "✅ Termux packages installation initiated"
            echo ""

            # ── Verify Frida ─────────────────────────────────────────────
            echo "=== Frida Verification ==="
            adb shell "ls -la /data/local/tmp/frida-server"
            adb shell "ps -A | grep frida" || true
            adb forward tcp:27042 tcp:27042 2>/dev/null || true
            echo "✅ Frida verified"
            echo ""

            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║       CLOUD ANDROID PHONE v3.0 — SETUP COMPLETE          ║"
            echo "╚══════════════════════════════════════════════════════════╝"
