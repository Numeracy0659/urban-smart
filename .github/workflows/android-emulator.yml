name: Redroid Android Cloud Phone (Production)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      - name: Install ADB tools
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb

      # ------------------------------------------------------------
      # Session restoration
      # ------------------------------------------------------------
      - name: Restore session (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Restore session (push)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            echo "✅ Decrypted"
          fi

      # ------------------------------------------------------------
      # Start Redroid with robust wait
      # ------------------------------------------------------------
      - name: Start Redroid container
        run: |
          mkdir -p ./android-data
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder" 2>/dev/null || true

          docker run -d --name redroid \
            --privileged \
            -v $(pwd)/android-data:/data \
            -p 5555:5555 \
            redroid/redroid:13.0.0-latest \
            androidboot.redroid_gpu_mode=guest \
            androidboot.redroid_width=1080 \
            androidboot.redroid_height=1920 \
            androidboot.redroid_dpi=420 \
            androidboot.redroid_fps=60 \
            androidboot.use_memfd=true

          echo "⏳ Waiting for Redroid to boot (up to 120 seconds)..."
          # Wait for container to be healthy (by checking logs)
          for i in {1..60}; do
            if docker logs redroid 2>&1 | grep -q "Boot completed"; then
              echo "✅ Redroid boot completed"
              break
            fi
            sleep 2
          done

          # Reset ADB
          adb kill-server
          adb start-server

          # Connect and wait for device to appear
          echo "⏳ Connecting ADB..."
          for i in {1..30}; do
            if adb connect localhost:5555 2>/dev/null | grep -q 'connected'; then
              echo "✅ ADB connected"
              break
            fi
            sleep 3
          done

          # Wait for device to be fully responsive (shell command works)
          echo "⏳ Waiting for device to become responsive..."
          for i in {1..40}; do
            if adb -s localhost:5555 shell "echo ready" 2>/dev/null | grep -q "ready"; then
              echo "✅ Device fully ready"
              break
            fi
            sleep 3
          done

          adb devices

      # ------------------------------------------------------------
      # Root and system writable
      # ------------------------------------------------------------
      - name: Enable system writes (root via su)
        run: |
          SERIAL="localhost:5555"
          echo "🔑 Verifying device readiness..."
          if ! adb -s $SERIAL shell "echo ready" 2>/dev/null | grep -q "ready"; then
            echo "❌ Device still not responding. Dumping container logs..."
            docker logs redroid
            exit 1
          fi

          echo "🔧 Remounting system as writable..."
          adb -s $SERIAL shell "su -c 'mount -o rw,remount /'"

          echo "📌 Verifying write access..."
          if adb -s $SERIAL shell "su -c 'touch /system/test_write 2>/dev/null'"; then
            adb -s $SERIAL shell "su -c 'rm /system/test_write'"
            echo "✅ System partition is writable"
          else
            echo "❌ System still read‑only. Exiting."
            exit 1
          fi

      # ------------------------------------------------------------
      # Spoof Pixel 8 Pro
      # ------------------------------------------------------------
      - name: Configure Pixel 8 Pro build.prop
        run: |
          SERIAL="localhost:5555"
          echo "📱 Configuring device as Google Pixel 8 Pro..."
          adb -s $SERIAL shell "su -c 'cp /system/build.prop /system/build.prop.backup'"
          adb -s $SERIAL shell "su -c \"echo 'ro.product.model=Pixel 8 Pro' >> /system/build.prop\""
          adb -s $SERIAL shell "su -c \"echo 'ro.product.brand=Google' >> /system/build.prop\""
          adb -s $SERIAL shell "su -c \"echo 'ro.product.manufacturer=Google' >> /system/build.prop\""
          adb -s $SERIAL shell "su -c \"echo 'ro.product.name=husky' >> /system/build.prop\""
          adb -s $SERIAL shell "su -c \"echo 'ro.product.device=husky' >> /system/build.prop\""
          adb -s $SERIAL shell "su -c \"echo 'ro.build.product=husky' >> /system/build.prop\""
          adb -s $SERIAL shell "su -c 'chmod 644 /system/build.prop'"
          echo "✅ Pixel 8 Pro profile applied"

      # ------------------------------------------------------------
      # Frida
      # ------------------------------------------------------------
      - name: Install Frida server
        run: |
          SERIAL="localhost:5555"
          echo "🛠️ Installing Frida server..."
          curl -L -o frida-server-17.1.3-android-x86_64.xz \
            https://github.com/frida/frida/releases/download/17.1.3/frida-server-17.1.3-android-x86_64.xz
          unxz frida-server-17.1.3-android-x86_64.xz
          adb -s $SERIAL push frida-server-17.1.3-android-x86_64 /data/local/tmp/frida-server
          adb -s $SERIAL shell "su -c 'chmod +x /data/local/tmp/frida-server'"
          adb -s $SERIAL shell "su -c 'nohup /data/local/tmp/frida-server > /dev/null 2>&1 &'"
          sleep 3
          if adb -s $SERIAL shell "ps -A | grep frida-server" | grep -q frida; then
            echo "✅ Frida is running"
          else
            echo "⚠️ Frida not detected, continuing..."
          fi

      # ------------------------------------------------------------
      # scrcpy-web
      # ------------------------------------------------------------
      - name: Start scrcpy-web
        run: |
          docker run -d --name scrcpy-web \
            --privileged \
            -p 8000:8000 \
            shmayro/scrcpy-web:latest \
            sh -c "
              for i in {1..30}; do
                if adb connect host.docker.internal:5555 2>/dev/null | grep -q 'connected'; then
                  break
                fi
                sleep 2
              done
              npm start
            "
          echo "⏳ Waiting for web server on port 8000..."
          for i in {1..40}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200"; then
              echo "✅ Web server ready"
              break
            fi
            sleep 3
          done
          docker logs scrcpy-web --tail 20

      # ------------------------------------------------------------
      # NPort tunnel
      # ------------------------------------------------------------
      - name: Start NPort tunnel
        id: tunnel
        run: |
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          echo "auth-pass=$AUTH_PASS" >> $GITHUB_OUTPUT
          npx nport 8000 -s urban-phone --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          echo $! > nport.pid

          echo "⏳ Waiting for tunnel to be live..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://urban-phone.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://urban-phone.nport.link"
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      # ------------------------------------------------------------
      # Display info
      # ------------------------------------------------------------
      - name: Display connection info
        run: |
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Device: Google Pixel 8 Pro (spoofed)"
          echo "📱 Web Interface: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔑 Auth: admin:${{ steps.tunnel.outputs.auth-pass }}"
          echo "🔌 ADB (fallback): ${{ steps.tunnel.outputs.tunnel-url }}:5555"
          echo "🔑 Root: Yes (Redroid + su)"
          echo "🛠️  Frida: Running on port 27042"
          echo "================================================"
          echo "To use ADB locally:"
          echo "  adb connect ${{ steps.tunnel.outputs.tunnel-url }}:5555"
          echo "  adb forward tcp:27042 tcp:27042"
          echo "  frida -H localhost:27042 com.moon.tools -l scripts/hook_zapero.js"

      # ------------------------------------------------------------
      # Keep alive
      # ------------------------------------------------------------
      - name: Keep alive
        run: sleep 340m

      # ------------------------------------------------------------
      # Save session
      # ------------------------------------------------------------
      - name: Save session
        if: always()
        run: |
          if docker ps -a --filter "name=redroid" --format '{{.Names}}' | grep -q redroid; then
            echo "📦 Creating backup..."
            docker exec redroid tar czf /tmp/data.tar.gz --warning=no-file-changed --ignore-failed-read -C /data . || true
            if docker exec redroid test -f /tmp/data.tar.gz; then
              docker cp redroid:/tmp/data.tar.gz ./android-data/
              echo "✅ Backup created"
            else
              echo "⚠️ Backup failed"
            fi
          else
            echo "⚠️ Container not running, skipping save"
          fi

          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' }}" == "true" ] && [ -f ./android-data/data.tar.gz ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -c ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/data.tar.gz*
          retention-days: 90

      # ------------------------------------------------------------
      # Cleanup
      # ------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop redroid scrcpy-web 2>/dev/null || true
          docker rm redroid scrcpy-web 2>/dev/null || true
