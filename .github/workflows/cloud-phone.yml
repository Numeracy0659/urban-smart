name: Cloud Android Phone

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
      resolution:
        description: 'Screen Resolution'
        required: false
        default: '720x1280'
      ram_mb:
        description: 'RAM (MB)'
        required: false
        default: '4096'
      enable_root:
        description: 'Enable Root (Magisk)'
        required: false
        default: true
        type: boolean
      enable_gapps:
        description: 'Enable Google Apps (PICO)'
        required: false
        default: true
        type: boolean
      enable_arm:
        description: 'Enable ARM Translation'
        required: false
        default: true
        type: boolean
      session_hours:
        description: 'Max Session Duration (hours)'
        required: false
        default: '6'

permissions:
  contents: read

jobs:
  start-phone:
    name: Start Cloud Phone
    if: github.event.inputs.action == 'start'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          if [ -e /dev/kvm ]; then
            sudo chmod 666 /dev/kvm
            ls -la /dev/kvm
          fi

      - name: Pull Docker Images
        run: |
          docker pull shmayro/dockerify-android:latest
          docker pull shmayro/scrcpy-web:latest

      - name: Start Android Emulator
        run: |
          docker run -d \
            --name dockerify-android \
            --privileged \
            --device /dev/kvm \
            -p 5555:5555 \
            -e DNS=one.one.one.one \
            -e RAM_SIZE=${{ github.event.inputs.ram_mb }} \
            -e "SCREEN_RESOLUTION=${{ github.event.inputs.resolution }}" \
            -e ROOT_SETUP=$(echo "${{ github.event.inputs.enable_root }}" | tr '[:upper:]' '[:lower:]') \
            -e GAPPS_SETUP=$(echo "${{ github.event.inputs.enable_gapps }}" | tr '[:upper:]' '[:lower:]') \
            -e ARM_TRANSLATION=$(echo "${{ github.event.inputs.enable_arm }}" | tr '[:upper:]' '[:lower:]') \
            shmayro/dockerify-android:latest

      - name: Start scrcpy-web
        run: |
          sleep 30
          docker run -d \
            --name scrcpy-web \
            --privileged \
            -p 8000:8000 \
            --link dockerify-android \
            shmayro/scrcpy-web:latest sh -c \
            "adb connect dockerify-android:5555 && npm start"

      - name: Wait for Boot
        run: |
          echo "Waiting for Android to boot..."
          for i in $(seq 1 300); do
            BOOT=$(docker exec dockerify-android adb -s emulator-5555 shell getprop sys.boot_completed 2>/dev/null || echo "0")
            if [ "${BOOT}" = "1" ]; then
              echo "Android boot completed after $((i * 2))s"
              break
            fi
            [ $((i % 30)) -eq 0 ] && echo "  ... $((i * 2))s"
            sleep 2
          done

          # Optimize
          docker exec dockerify-android adb shell settings put global window_animation_scale 0 2>/dev/null || true
          docker exec dockerify-android adb shell settings put global transition_animation_scale 0 2>/dev/null || true
          docker exec dockerify-android adb shell settings put global animator_duration_scale 0 2>/dev/null || true
          docker exec dockerify-android adb shell settings put system screen_off_timeout 2147483647 2>/dev/null || true

      - name: Wait for scrcpy-web
        run: |
          for i in $(seq 1 120); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null || echo "000")
            if [ "${HTTP_CODE}" != "000" ] && [ "${HTTP_CODE}" != "502" ] && [ "${HTTP_CODE}" != "503" ]; then
              echo "scrcpy-web ready (HTTP ${HTTP_CODE})"
              exit 0
            fi
            sleep 3
          done
          echo "::warning::scrcpy-web may not be fully ready"

      - name: Start NPort Tunnel
        id: tunnel
        run: |
          npm install -g nport
          SUBDOMAIN="caphone-$(date +%s | sha256sum | head -c 6)"
          
          nohup nport 8000 -s "${SUBDOMAIN}" > /tmp/nport.log 2>&1 &
          
          for i in $(seq 1 30); do
            sleep 3
            if grep -q "nport.link" /tmp/nport.log 2>/dev/null; then
              TUNNEL_URL=$(grep -oP 'https://[a-zA-Z0-9.-]+\.nport\.link' /tmp/nport.log | head -1)
              if [ -n "${TUNNEL_URL}" ]; then
                echo "url=${TUNNEL_URL}" >> "${GITHUB_OUTPUT}"
                echo "tunnel_url=${TUNNEL_URL}"
                exit 0
              fi
            fi
          done
          echo "url=http://localhost:8000" >> "${GITHUB_OUTPUT}"
          echo "tunnel_url=http://localhost:8000"

      - name: Save Access URL to Artifact
        run: |
          mkdir -p /tmp/access-info
          echo "TUNNEL_URL=${{ steps.tunnel.outputs.url }}" > /tmp/access-info/url.txt
          echo "Android Version: API 34 (Android 14)" >> /tmp/access-info/url.txt
          echo "Resolution: ${{ github.event.inputs.resolution }}" >> /tmp/access-info/url.txt
          echo "RAM: ${{ github.event.inputs.ram_mb }}MB" >> /tmp/access-info/url.txt
          echo "Session: ${{ github.event.inputs.session_hours }} hours max" >> /tmp/access-info/url.txt
          echo "" >> /tmp/access-info/url.txt
          echo "Open the URL in your browser to access your Cloud Android Phone!" >> /tmp/access-info/url.txt
          echo "${{ steps.tunnel.outputs.url }}" >> /tmp/access-info/only-url.txt
          cat /tmp/access-info/url.txt

      - name: Upload Access URL as Artifact
        uses: actions/upload-artifact@v4
        with:
          name: phone-access-url
          path: /tmp/access-info/

      - name: Keep Alive & Monitor
        run: |
          MAX_SECONDS=$((${{ github.event.inputs.session_hours }} * 3600))
          START_TIME=$(date +%s)
          echo "Session started. Max duration: ${{ github.event.inputs.session_hours }}h"
          while true; do
            ELAPSED=$(($(date +%s) - START_TIME))
            REMAINING=$((MAX_SECONDS - ELAPSED))
            if [ "${REMAINING}" -le 0 ]; then
              echo "TIME LIMIT REACHED"
              exit 0
            fi
            BOOT=$(docker exec dockerify-android adb -s emulator-5555 shell getprop sys.boot_completed 2>/dev/null || echo "0")
            HOURS=$((REMAINING / 3600))
            MINUTES=$(((REMAINING % 3600) / 60))
            echo "[$(date -u)] boot=${BOOT} remaining=${HOURS}h ${MINUTES}m"
            sleep 300
          done

  stop-phone:
    name: Stop Cloud Phone
    if: github.event.inputs.action == 'stop'
    runs-on: ubuntu-latest
    steps:
      - name: Stop Containers
        run: |
          docker stop scrcpy-web 2>/dev/null && docker rm scrcpy-web 2>/dev/null || true
          docker stop dockerify-android 2>/dev/null && docker rm dockerify-android 2>/dev/null || true
          pkill -f "nport" 2>/dev/null || true
          echo "Stopped"
