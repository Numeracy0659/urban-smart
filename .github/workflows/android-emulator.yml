name: Cloud Android Phone (Smooth & Production)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  phone:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      # ==============================================================
      # 1. Enable KVM hardware acceleration (makes emulator smooth)
      # ==============================================================
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      # ==============================================================
      # 2. Install ADB tools (for debugging, optional)
      # ==============================================================
      - name: Install ADB
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb

      # ==============================================================
      # 3. Session persistence: restore encrypted artifact if any
      # ==============================================================
      - name: Restore session data (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Restore session data (push)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            tar -xzf ./android-data/data.tar.gz -C ./android-data/
            rm -f ./android-data/data.tar.gz
            echo "✅ Session restored and decrypted"
          fi

      # ==============================================================
      # 4. Create the setup script (runs inside the emulator runner)
      # ==============================================================
      - name: Create setup script
        run: |
          cat > setup.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          echo "================================================"
          echo "📱 EMULATOR IS READY – STARTING SERVICES"
          echo "================================================"

          # The emulator is already booted when this script runs.
          # Wait a moment for ADB to be fully stable.
          sleep 5

          # --------------------------------------------
          # Start scrcpy-web (browser UI) using host network
          # --------------------------------------------
          echo "📱 Starting scrcpy-web on port 8000..."
          docker run -d --name scrcpy-web \
            --network host \
            --privileged \
            shmayro/scrcpy-web:latest \
            sh -c "
              for i in {1..30}; do
                if adb connect localhost:5555 2>/dev/null | grep -q 'connected'; then
                  break
                fi
                sleep 2
              done
              npm start
            "

          # Wait for web server to respond
          echo "⏳ Waiting for web server on port 8000..."
          for i in {1..40}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200"; then
              echo "✅ Web server ready"
              break
            fi
            sleep 3
          done

          # Show scrcpy-web logs for debugging
          docker logs scrcpy-web --tail 20

          # --------------------------------------------
          # Start NPort tunnel with random authentication
          # --------------------------------------------
          echo "🔗 Starting NPort tunnel..."
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          npx nport 8000 -s urban-phone --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          NPORT_PID=$!
          echo $NPORT_PID > nport.pid

          echo "⏳ Waiting for tunnel to be live..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://urban-phone.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://urban-phone.nport.link"

          # --------------------------------------------
          # Display connection information
          # --------------------------------------------
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Web Interface: $TUNNEL_URL"
          echo "🔑 Auth: admin:$AUTH_PASS"
          echo "🔌 ADB (fallback): $TUNNEL_URL:5555"
          echo "================================================"
          echo "To use ADB locally:"
          echo "  adb connect $TUNNEL_URL:5555"
          echo "  adb forward tcp:27042 tcp:27042"
          echo "  frida -H localhost:27042 com.moon.tools -l scripts/hook_zapero.js"

          # --------------------------------------------
          # Keep alive for the entire job duration
          # --------------------------------------------
          echo "⏳ Keeping emulator alive for 340 minutes..."
          sleep 340m
          SCRIPT

          chmod +x setup.sh

      # ==============================================================
      # 5. Start the Android emulator with hardware acceleration
      # ==============================================================
      - name: Start Android emulator
        id: emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 5X
          ram-size: 4096
          disk-size: 4096M
          force-avd-creation: false
          disable-linux-hw-accel: false   # use KVM
          emulator-boot-timeout: 600
          emulator-options: >-
            -no-snapshot-load
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -camera-front none
            -memory 4096
            -cores 4
          disable-animations: true
          script: bash setup.sh

      # ==============================================================
      # 6. Save session (encrypt and upload artifact)
      # ==============================================================
      - name: Save session
        if: always()
        run: |
          # Only save if the emulator data directory exists and contains something
          if [ -d ./android-data ] && [ "$(ls -A ./android-data)" ]; then
            echo "📦 Creating backup..."
            tar -czf data.tar.gz -C ./android-data .
            if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' }}" == "true" ]; then
              gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -c data.tar.gz
              mv data.tar.gz.gpg ./android-data/
              rm -f data.tar.gz
              echo "✅ Backup encrypted"
            else
              mv data.tar.gz ./android-data/
              echo "✅ Backup created (plain)"
            fi
          else
            echo "⚠️ No data to save"
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/*
          retention-days: 90

      # ==============================================================
      # 7. Cleanup (always runs)
      # ==============================================================
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop scrcpy-web 2>/dev/null || true
          docker rm scrcpy-web 2>/dev/null || true
          # The emulator is automatically killed by the runner action.
