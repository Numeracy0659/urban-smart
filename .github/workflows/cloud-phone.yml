###############################################################################
#  Cloud Android Phone v4.0 — Production Grade
#  Architecture: ReactiveCircus + ws-scrcpy + bore.pub tunnel
#  No Docker. Direct KVM on GitHub Actions runner.
###############################################################################
name: Cloud Android Phone v4

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: start or stop'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
      session_hours:
        description: 'Session duration (hours, 1-8)'
        required: false
        default: '4'

permissions:
  contents: read
  actions: read

###############################################################################
# JOB 1: START CLOUD PHONE
###############################################################################
jobs:
  start-phone:
    name: Start Cloud Phone
    if: github.event.inputs.action == 'start'
    runs-on: ubuntu-latest
    timeout-minutes: 540  # 9 hours max

    steps:
      # ── Step 1: Enable KVM ──────────────────────────────────────────────
      - name: Enable KVM Hardware Acceleration
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' \
            | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm
          ls -la /dev/kvm
          groups
          echo "KVM enabled successfully"

      # ── Step 2: Install Node.js for ws-scrcpy ───────────────────────────
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # ── Step 3: Install ws-scrcpy (web-based screen sharing) ────────────
      - name: Install ws-scrcpy
        run: |
          echo "=== Installing ws-scrcpy ==="
          sudo apt-get update -qq
          sudo apt-get install -y -qq build-essential python3
          git clone --depth 1 https://github.com/NetrisTV/ws-scrcpy.git /tmp/ws-scrcpy
          cd /tmp/ws-scrcpy
          npm install --ignore-scripts 2>&1 | tail -5
          # Install node-gyp deps and rebuild native modules
          npm rebuild 2>&1 | tail -5 || true
          echo "✅ ws-scrcpy installed"

      # ── Step 4: Download bore tunnel client ─────────────────────────────
      - name: Download bore.pub Tunnel Client
        run: |
          echo "=== Downloading bore ==="
          curl -sL https://github.com/ekzhang/bore/releases/download/v0.5.0/bore-v0.5.0-x86_64-unknown-linux-musl.tar.gz \
            | tar xz -C /tmp/
          chmod +x /tmp/bore
          /tmp/bore --help | head -3
          echo "✅ bore downloaded"

      # ── Step 5: Boot Android Emulator ───────────────────────────────────
      - name: Boot Android Emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 34
          arch: x86_64
          profile: pixel_6_pro
          ram-size: 4096M
          disk-size: 6G
          heap-size: 512M
          force-avd-creation: true
          emulator-options: -no-snapshot-save -gpu swiftshader_indirect -noaudio -no-boot-anim -camera-back none -screen touch
          disable-animations: true
          boot-timeout: 900
          avd-name: CloudPhone
          script: |
            #!/bin/bash
            set -euo pipefail

            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  CLOUD ANDROID PHONE v4.0 — SETUP                      ║"
            echo "╚══════════════════════════════════════════════════════════╝"
            echo ""

            # ── System Verification ───────────────────────────────────────
            echo "=== System Info ==="
            ANDROID_VERSION=$(adb shell getprop ro.build.version.release)
            SDK_LEVEL=$(adb shell getprop ro.build.version.sdk)
            ABI_LIST=$(adb shell getprop ro.product.cpu.abilist)
            echo "Android: ${ANDROID_VERSION} (API ${SDK_LEVEL})"
            echo "ABIs: ${ABI_LIST}"
            echo ""

            echo "=== Memory ==="
            adb shell cat /proc/meminfo | head -3
            echo ""

            echo "=== Disk ==="
            adb shell df -h /data
            echo ""

            # ── Root Check ───────────────────────────────────────────────
            echo "=== Root Status ==="
            adb shell cat /proc/self/status | grep Uid || true
            # Check if su exists
            adb shell "ls /system/xbin/su /system/bin/su /su/bin/su 2>/dev/null || echo 'su binary not present'" || true
            adb shell "which magisk 2>/dev/null || echo 'Magisk not found (expected for standard AVD)'" || true
            echo "Note: Standard AVD provides root via adb shell. For full su/Magisk, a rooted image is needed."
            echo ""

            # ── Performance Optimizations ─────────────────────────────────
            echo "=== Performance Optimizations ==="
            adb shell settings put global window_animation_scale 0
            adb shell settings put global transition_animation_scale 0
            adb shell settings put global animator_duration_scale 0
            adb shell settings put system screen_off_timeout 2147483647
            adb shell settings put secure show_ime_with_hard_keyboard 1
            adb shell settings put global development_settings_enabled 1
            adb shell settings put global enabled_verify_apps 0
            echo "✅ Optimizations applied"
            echo ""

            # ── Dynamic APK URL Resolution ────────────────────────────────
            echo "=== Resolving Latest APK Versions ==="
            cd /tmp

            # Termux (use API to get latest stable)
            TERMUX_URL=$(curl -sL "https://api.github.com/repos/termux/termux-app/releases" \
              | python3 -c "import json,sys; r=json.load(sys.stdin); 
              assets=[a for a in r[0]['assets'] if 'x86_64' in a['name'] and '.apk' in a['name']];
              print(assets[0]['browser_download_url'] if assets else '')")
            echo "  Termux: ${TERMUX_URL}"

            # F-Droid
            FDROID_URL="https://f-droid.org/F-Droid.apk"
            echo "  F-Droid: ${FDROID_URL}"

            # ScreenStream (check latest release)
            SCREENSTREAM_URL=$(curl -sL "https://api.github.com/repos/dkrivoruchko/ScreenStream/releases/latest" \
              | python3 -c "import json,sys; r=json.load(sys.stdin);
              assets=[a for a in r.get('assets',[]) if 'PlayStore' in a['name']];
              print(assets[0]['browser_download_url'] if assets else r.get('assets',[])[0]['browser_download_url'] if r.get('assets') else '')")
            echo "  ScreenStream: ${SCREENSTREAM_URL}"

            # Firefox (use x86_64 for performance)
            FIREFOX_URL=$(curl -sL "https://api.github.com/repos/mozilla-mobile/fenix/releases/latest" \
              | python3 -c "import json,sys; r=json.load(sys.stdin);
              assets=[a for a in r.get('assets',[]) if 'x86_64' in a['name'] and '.apk' in a['name']];
              print(assets[0]['browser_download_url'] if assets else '')")
            echo "  Firefox: ${FIREFOX_URL}"

            # Kiwi Browser (use latest from src.next)
            KIWI_URL=$(curl -sL "https://api.github.com/repos/kiwibrowser/src.next/releases" \
              | python3 -c "import json,sys; releases=json.load(sys.stdin);
              for r in releases:
                  assets=[a for a in r.get('assets',[]) if a['name'].startswith('com.kiwibrowser.browser-x86') and '.apk' in a['name'] and '.dev' not in a['name']];
                  if assets: print(assets[0]['browser_download_url']); break")
            echo "  Kiwi: ${KIWI_URL}"

            echo ""

            # ── Download APKs ─────────────────────────────────────────────
            echo "=== Downloading APKs ==="

            curl -L -o /tmp/termux.apk "${TERMUX_URL}" 2>&1 | tail -1
            curl -L -o /tmp/termux-boot.apk "https://github.com/termux/termux-boot/releases/download/v0.8.1/termux-boot-app_v0.8.1%2Bgithub.debug.apk" 2>&1 | tail -1
            curl -L -o /tmp/termux-api.apk "https://github.com/termux/termux-api/releases/download/v0.53.0/termux-api-app_v0.53.0%2Bgithub.debug.apk" 2>&1 | tail -1
            curl -L -o /tmp/fdroid.apk "${FDROID_URL}" 2>&1 | tail -1
            curl -L -o /tmp/screenstream.apk "${SCREENSTREAM_URL}" 2>&1 | tail -1
            curl -L -o /tmp/firefox.apk "${FIREFOX_URL}" 2>&1 | tail -1
            curl -L -o /tmp/kiwi.apk "${KIWI_URL}" 2>&1 | tail -1

            echo ""
            echo "=== APK Download Summary ==="
            for f in /tmp/*.apk; do
              if [ -f "$f" ] && [ $(stat -c%s "$f" 2>/dev/null || echo 0) -gt 100000 ]; then
                echo "  ✅ $(basename $f): $(du -h $f | cut -f1)"
              else
                echo "  ❌ $(basename $f): FAILED"
              fi
            done
            echo ""

            # ── Install APKs ──────────────────────────────────────────────
            echo "=== Installing APKs ==="
            for apk in termux termux-boot termux-api fdroid screenstream firefox kiwi; do
              apk_path="/tmp/${apk}.apk"
              if [ -f "${apk_path}" ] && [ $(stat -c%s "${apk_path}" 2>/dev/null || echo 0) -gt 100000 ]; then
                echo "  Installing ${apk}..."
                adb install -r "${apk_path}" 2>&1 | tail -1
              else
                echo "  ❌ ${apk}: file not valid"
              fi
            done
            echo ""
            echo "=== Verify Installed ==="
            adb shell pm list packages 2>/dev/null | grep -iE 'termux|fdroid|screenstream|firefox|kiwi' || true
            echo ""

            # ── Configure Permissions ─────────────────────────────────────
            echo "=== Configuring Permissions ==="
            adb shell appops set com.github.dkrivoruchko.screenstream SYSTEM_ALERT_WINDOW allow 2>/dev/null || true
            adb shell pm grant com.github.dkrivoruchko.screenstream android.permission.CAMERA 2>/dev/null || true
            adb shell pm grant com.github.dkrivoruchko.screenstream android.permission.RECORD_AUDIO 2>/dev/null || true
            adb shell pm grant com.github.dkrivoruchko.screenstream android.permission.FOREGROUND_SERVICE 2>/dev/null || true
            adb shell dumpsys deviceidle whitelist +com.termux 2>/dev/null || true
            adb shell dumpsys deviceidle whitelist +com.termux.api 2>/dev/null || true
            adb shell dumpsys deviceidle whitelist +com.github.dkrivoruchko.screenstream 2>/dev/null || true
            echo "✅ Permissions configured"
            echo ""

            # ── Install Frida Server ──────────────────────────────────────
            echo "=== Installing Frida Server ==="
            FRIDA_VERSION="17.16.4"
            curl -L -o /tmp/frida-server.xz \
              "https://github.com/frida/frida/releases/download/${FRIDA_VERSION}/frida-server-${FRIDA_VERSION}-android-x86_64.xz" 2>&1 | tail -1
            
            FRIDA_SIZE=$(stat -c%s /tmp/frida-server.xz 2>/dev/null || echo 0)
            if [ "${FRIDA_SIZE}" -gt 100000 ]; then
              xz -d /tmp/frida-server.xz -c > /tmp/frida-server
              chmod 755 /tmp/frida-server
              adb push /tmp/frida-server /data/local/tmp/frida-server
              adb shell chmod 755 /data/local/tmp/frida-server
              adb shell "nohup /data/local/tmp/frida-server -l 0.0.0.0 > /dev/null 2>&1 &"
              sleep 3
              adb shell pidof frida-server && echo "✅ Frida server RUNNING" || echo "⚠️ Frida not running yet"
            else
              echo "::warning::Frida download failed (size: ${FRIDA_SIZE})"
            fi
            echo ""

            # ── Start ws-scrcpy Web Server ────────────────────────────────
            echo "=== Starting ws-scrcpy Web Interface ==="
            
            # Install frida-server.jar for scrcpy (modified version with WebSocket)
            cd /tmp/ws-scrcpy
            npm start &
            SCRCPY_PID=$!
            echo "ws-scrcpy PID: ${SCRCPY_PID}"
            sleep 5
            
            # Check if it's running
            if curl -s http://localhost:8000 > /dev/null 2>&1; then
              echo "✅ ws-scrcpy running on port 8000"
            else
              echo "⚠️ ws-scrcpy may still be starting..."
            fi
            echo ""

            # ── Start bore.pub Tunnel ─────────────────────────────────────
            echo "=== Starting bore.pub Tunnel ==="
            
            # Start bore tunnel in background
            /tmp/bore local 8000 --to bore.pub > /tmp/bore.log 2>&1 &
            BORE_PID=$!
            echo "bore PID: ${BORE_PID}"
            sleep 8
            
            # Extract the tunnel URL
            TUNNEL_URL=""
            if grep -q "listening at" /tmp/bore.log 2>/dev/null; then
              TUNNEL_URL=$(grep -oP 'bore\.pub:\d+' /tmp/bore.log | head -1)
            fi
            
            if [ -n "${TUNNEL_URL}" ]; then
              echo "✅ Tunnel URL: http://${TUNNEL_URL}"
              echo "http://${TUNNEL_URL}" > /tmp/tunnel_url.txt
            else
              echo "bore log content:"
              cat /tmp/bore.log
              echo "⚠️ Tunnel may need more time to establish"
              echo "http://TUNNEL_PENDING" > /tmp/tunnel_url.txt
            fi
            echo ""

            # ── Launch ScreenStream ───────────────────────────────────────
            echo "=== Launching ScreenStream ==="
            adb shell am start -n com.github.dkrivoruchko.screenstream/.MainActivity 2>/dev/null || true
            sleep 3
            adb shell am start -n com.github.dkrivoruchko.screenstream/.web.WebStreamingService 2>/dev/null || true
            echo "✅ ScreenStream launched"
            echo ""

            # ── Launch Termux & Setup ─────────────────────────────────────
            echo "=== Setting Up Termux ==="
            adb shell am start -n com.termux/.activity.TermuxActivity 2>/dev/null || true
            sleep 15

            # Create Termux setup script
            cat > /tmp/setup_termux.sh << 'TERMUX_EOF'
            #!/bin/bash
            export HOME=/data/data/com.termux/files/home
            export PREFIX=/data/data/com.termux/files/usr
            export PATH=$PREFIX/bin:$PATH

            echo "=== Termux First-Run Setup ==="

            # Update package lists
            apt update -y 2>&1 | tail -5

            echo "Installing core development tools..."
            apt install -y \
              python python-pip \
              nodejs \
              git curl wget \
              openssh \
              nano vim \
              tmux htop \
              gcc clang make cmake \
              2>&1 | tail -5

            echo "Installing network & security tools..."
            apt install -y \
              nmap tcpdump net-tools ncat \
              proxychains-ng ipcalc \
              whois dnsutils \
              jq httpie \
              neofetch tree \
              openssl \
              strace ltrace \
              2>&1 | tail -5

            echo "Installing pentesting Python packages..."
            pip install \
              frida-tools \
              mitmproxy \
              sqlmap \
              scapy \
              paramiko \
              requests \
              beautifulsoup4 \
              lxml \
              2>&1 | tail -5

            echo "Configuring Termux..."
            mkdir -p ~/.termux/boot
            cat > ~/.termux/termux.properties << 'PROP_EOF'
            extra-keys = [['ESC','TAB','CTRL','ALT','/','|','-','BKSP'],['UP','LEFT','RIGHT','DOWN','HOME','END','PGUP','PGDN']]
            allow-external-apps=true
            use-fullscreen-workaround=true
            PROP_EOF

            echo "✅ Termux setup complete!"
            echo "Available tools: python3, node, git, nmap, tcpdump, ncat, tmux, vim, htop"
            echo "Python packages: frida-tools, mitmproxy, sqlmap, scapy, paramiko"
            TERMUX_EOF

            adb push /tmp/setup_termux.sh /data/local/tmp/setup_termux.sh
            adb shell "run-as com.termux sh -c 'cp /data/local/tmp/setup_termux.sh /data/data/com.termux/files/home/ && chmod +x /data/data/com.termux/files/home/setup_termux.sh && bash /data/data/com.termux/files/home/setup_termux.sh 2>&1 &'" || true
            echo "✅ Termux setup initiated (running in background)"
            echo ""

            # ── Session Info ──────────────────────────────────────────────
            echo "╔══════════════════════════════════════════════════════════╗"
            echo "║  CLOUD ANDROID PHONE v4.0 — READY                       ║"
            echo "╠══════════════════════════════════════════════════════════╣"
            echo "║  Access: ${TUNNEL_URL:-Pending...}                  ║"
            echo "║  ws-scrcpy: http://localhost:8000                       ║"
            echo "║  Android: ${ANDROID_VERSION} (API ${SDK_LEVEL})                     ║"
            echo "║  Frida: $([ -n \"$(adb shell pidof frida-server 2>/dev/null)\" ] && echo RUNNING || echo NOT RUNNING)                        ║"
            echo "╚══════════════════════════════════════════════════════════╝"

            # ── Keep Session Alive ────────────────────────────────────────
            echo ""
            echo "=== Session Active — Keeping Phone Alive ==="
            
            SESSION_SECONDS=$((4 * 3600))  # 4 hours default
            ELAPSED=0
            while [ ${ELAPSED} -lt ${SESSION_SECONDS} ]; do
              # Check emulator health every 5 minutes
              if [ $((ELAPSED % 300)) -eq 0 ] && [ ${ELAPSED} -gt 0 ]; then
                BOOT_STATUS=$(adb shell getprop sys.boot_completed 2>/dev/null || echo "0")
                echo "[$(date -u)] Boot status: ${BOOT_STATUS}, Elapsed: $((ELAPSED / 60))min"
                
                # Restart bore tunnel if it died
                if ! kill -0 ${BORE_PID} 2>/dev/null; then
                  echo "[$(date -u)] Restarting bore tunnel..."
                  /tmp/bore local 8000 --to bore.pub > /tmp/bore.log 2>&1 &
                  BORE_PID=$!
                fi
                
                # Restart frida if it died
                if [ -z "$(adb shell pidof frida-server 2>/dev/null)" ]; then
                  echo "[$(date -u)] Restarting frida-server..."
                  adb shell "nohup /data/local/tmp/frida-server -l 0.0.0.0 > /dev/null 2>&1 &"
                fi
              fi
              sleep 15
              ELAPSED=$((ELAPSED + 15))
            done
            
            echo "Session complete. Shutting down."
