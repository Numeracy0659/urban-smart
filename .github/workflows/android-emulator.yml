name: Cloud Android Phone (Production)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  phone:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      # ================================================================
      # 1. Install system dependencies
      # ================================================================
      - name: Install ADB and kernel modules
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb linux-modules-extra-$(uname -r)

      - name: Load kernel modules for Redroid
        run: |
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe ashmem_linux || true

      # ================================================================
      # 2. Prepare data directory with correct permissions
      # ================================================================
      - name: Create data directory
        run: |
          mkdir -p ./android-data
          chmod 777 ./android-data

      # ================================================================
      # 3. Session persistence (restore encrypted artifact)
      # ================================================================
      - name: Restore session data (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Restore session data (push)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            tar -xzf ./android-data/data.tar.gz -C ./android-data/
            rm -f ./android-data/data.tar.gz
            echo "✅ Session restored and decrypted"
          fi

      # ================================================================
      # 4. Create the setup script
      # ================================================================
      - name: Create setup script
        run: |
          cat > setup.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          echo "================================================"
          echo "📱 STARTING REDROID + SCREENSTREAM WEBRTC"
          echo "================================================"

          # ------------------------------------------------------------------
          # Start Redroid container with STABLE settings
          # ------------------------------------------------------------------
          echo "🚀 Starting Redroid container..."
          docker run -d --name redroid \
            --privileged \
            -v $(pwd)/android-data:/data \
            -p 5555:5555 \
            redroid/redroid:14.0.0_64only-latest \
            androidboot.redroid_gpu_mode=host \
            androidboot.redroid_width=1080 \
            androidboot.redroid_height=2400 \
            androidboot.redroid_dpi=420 \
            androidboot.redroid_fps=60 \
            androidboot.use_memfd=true

          # ------------------------------------------------------------------
          # Wait for Redroid to boot (ROBUST ADB)
          # ------------------------------------------------------------------
          echo "⏳ Waiting for Redroid to boot..."
          sleep 30

          adb kill-server
          adb start-server

          # Connect to device
          for i in {1..30}; do
            if adb connect localhost:5555 2>/dev/null | grep -q 'connected'; then
              echo "✅ ADB connected"
              break
            fi
            sleep 5
          done

          # Wait for device to become online (not offline)
          for i in {1..30}; do
            STATE=$(adb devices | grep -E "localhost:5555\s+(\w+)" | awk '{print $2}')
            if [ "$STATE" = "device" ]; then
              echo "✅ Device online"
              break
            else
              echo "⏳ Device state: $STATE (attempt $i/30)"
              if [ "$STATE" = "offline" ]; then
                adb reconnect
                sleep 3
              fi
              sleep 5
            fi
          done

          # Wait for boot completion (sys.boot_completed = 1)
          for i in {1..60}; do
            if adb -s localhost:5555 shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "✅ Boot completed"
              break
            fi
            sleep 5
          done

          # Verify device is responsive
          if ! adb -s localhost:5555 shell "echo ready" 2>/dev/null | grep -q "ready"; then
            echo "❌ Device not responsive. Dumping logs..."
            docker logs redroid
            exit 1
          fi

          adb devices

          # ------------------------------------------------------------------
          # Enable ARM translation (for app compatibility)
          # ------------------------------------------------------------------
          echo "🔧 Enabling ARM translation..."
          adb -s localhost:5555 shell setprop persist.sys.nativebridge 1
          adb -s localhost:5555 shell setprop persist.sys.nativebridge.enable 1

          # ------------------------------------------------------------------
          # Install ScreenStream APK (WebRTC full‑screen solution)
          # ------------------------------------------------------------------
          echo "📱 Downloading ScreenStream APK..."
          curl -L -o screenstream.apk \
            "https://github.com/dkrivoruchko/ScreenStream/releases/download/v0.15.3/ScreenStream_v0.15.3.apk" || \
            curl -L -o screenstream.apk \
            "https://www.apkmirror.com/wp-content/themes/APKMirror/download.php?id=3446516"

          echo "📱 Installing ScreenStream..."
          adb -s localhost:5555 install -r screenstream.apk || echo "⚠️ Installation failed, continuing..."

          # ------------------------------------------------------------------
          # Launch ScreenStream in Global (WebRTC) mode
          # ------------------------------------------------------------------
          echo "📱 Launching ScreenStream in Global (WebRTC) mode..."

          STREAM_NAME="cloud-phone-$(date +%s)"
          STREAM_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)

          # Try deep link method
          adb -s localhost:5555 shell am start \
            -a android.intent.action.VIEW \
            -d "screenstream://start?mode=webrtc&name=$STREAM_NAME&password=$STREAM_PASS" || true

          # Fallback to UI automation
          if [ $? -ne 0 ]; then
            echo "⚠️ Deep link failed, using UI automation..."
            adb -s localhost:5555 shell am start -n info.dvkr.screenstream/.MainActivity
            sleep 5
            adb -s localhost:5555 shell input tap 540 1200
            sleep 2
            adb -s localhost:5555 shell input text "$STREAM_NAME"
            adb -s localhost:5555 shell input keyevent 61
            adb -s localhost:5555 shell input text "$STREAM_PASS"
            adb -s localhost:5555 shell input keyevent 66
          fi

          echo "✅ ScreenStream started in Global (WebRTC) mode"
          echo "📱 Stream Name: $STREAM_NAME"
          echo "🔑 Stream Password: $STREAM_PASS"

          # ------------------------------------------------------------------
          # Start NPort tunnel for ADB fallback
          # ------------------------------------------------------------------
          echo "🔗 Starting NPort tunnel for ADB fallback..."
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          npx nport 5555 -s cloud-phone-adb --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          NPORT_PID=$!
          echo $NPORT_PID > nport.pid
          TUNNEL_URL="https://cloud-phone-adb.nport.link"

          # ------------------------------------------------------------------
          # Display connection information
          # ------------------------------------------------------------------
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY (ScreenStream WebRTC)"
          echo "================================================"
          echo "📱 Android 14 (64-bit)"
          echo "📱 Screen: 1080x2400 @ 60fps"
          echo ""
          echo "📌 To view the phone in FULL SCREEN:"
          echo "  1. Open https://screenstream.io in your browser"
          echo "  2. Enter Stream ID: $STREAM_NAME"
          echo "  3. Enter Password: $STREAM_PASS"
          echo "  4. Click 'Watch' – the stream will appear"
          echo "  5. Press F11 for full-screen browser mode"
          echo ""
          echo "📌 Direct link:"
          echo "  https://screenstream.io/?id=$STREAM_NAME&password=$STREAM_PASS"
          echo ""
          echo "🔌 ADB fallback: $TUNNEL_URL (auth admin:$AUTH_PASS)"
          echo "   Use: adb connect $TUNNEL_URL:443"
          echo "================================================"

          # Save credentials for workflow output
          echo "STREAM_NAME=$STREAM_NAME" >> /tmp/stream_info
          echo "STREAM_PASS=$STREAM_PASS" >> /tmp/stream_info
          echo "AUTH_PASS=$AUTH_PASS" >> /tmp/stream_info
          echo "TUNNEL_URL=$TUNNEL_URL" >> /tmp/stream_info

          # ------------------------------------------------------------------
          # Keep alive for the entire job duration
          # ------------------------------------------------------------------
          echo "⏳ Keeping phone alive for 340 minutes..."
          sleep 340m
          SCRIPT

          chmod +x setup.sh

      # ================================================================
      # 5. Execute the setup script
      # ================================================================
      - name: Run setup
        run: bash setup.sh

      # ================================================================
      # 6. Save session (encrypt and upload artifact)
      # ================================================================
      - name: Save session
        if: always()
        run: |
          # Fix permissions on the data directory before tar
          if [ -d ./android-data ] && [ "$(ls -A ./android-data 2>/dev/null)" ]; then
            echo "📦 Creating backup..."
            # Use sudo to read the directory if needed
            sudo tar -czf data.tar.gz --warning=no-file-changed -C ./android-data . || true
            # Change ownership to runner for artifact upload
            sudo chown -R $(whoami) ./android-data
            if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' }}" == "true" ] && [ -f data.tar.gz ]; then
              gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -c data.tar.gz
              mv data.tar.gz.gpg ./android-data/
              rm -f data.tar.gz
              echo "✅ Backup encrypted"
            elif [ -f data.tar.gz ]; then
              mv data.tar.gz ./android-data/
              echo "✅ Backup created"
            else
              echo "⚠️ Backup failed"
            fi
          else
            echo "⚠️ No data to save"
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/*
          retention-days: 90

      # ================================================================
      # 7. Cleanup
      # ================================================================
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop redroid 2>/dev/null || true
          docker rm redroid 2>/dev/null || true
          # Remove data directory to free space
          sudo rm -rf ./android-data 2>/dev/null || true
