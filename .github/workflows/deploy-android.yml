name: Build & Deploy Cloud Android Phone
on:
  workflow_dispatch:
    inputs:
      device_model:
        description: 'Device model to spoof'
        required: true
        default: 'Pixel 8 Pro'
      android_version:
        description: 'Android version (e.g., 14.0.0)'
        required: true
        default: '14.0.0'
      persistent:
        description: 'Persistent session?'
        required: true
        default: 'true'
        type: boolean

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Install ADB
        run: sudo apt-get update && sudo apt-get install -y android-tools-adb

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Container Registry
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push custom image
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./Dockerfile.android
          push: true
          tags: |
            ghcr.io/${{ github.repository }}/android-cloud-phone:${{ github.sha }}
            ghcr.io/${{ github.repository }}/android-cloud-phone:latest
          cache-from: type=registry,ref=ghcr.io/${{ github.repository }}/android-cloud-phone:buildcache
          cache-to: type=registry,ref=ghcr.io/${{ github.repository }}/android-cloud-phone:buildcache,mode=max
          build-args: |
            ANDROID_VERSION=${{ github.event.inputs.android_version }}
            DEVICE_MODEL=${{ github.event.inputs.device_model }}

      - name: Create Kasm session
        id: deploy
        run: |
          sleep 10
          PAYLOAD=$(jq -n \
            --arg image "ghcr.io/${{ github.repository }}/android-cloud-phone:${{ github.sha }}" \
            --arg model "${{ github.event.inputs.device_model }}" \
            --arg persistent "${{ github.event.inputs.persistent }}" \
            '{
              api_key: "${{ secrets.KASM_API_KEY }}",
              api_key_secret: "${{ secrets.KASM_API_SECRET }}",
              target_user: "researcher",
              workspace_name: "Android Cloud Phone",
              workspace_image: $image,
              container_config: {
                environment: [
                  "androidboot.redroid_gpu_mode=guest",
                  "androidboot.redroid_width=1080",
                  "androidboot.redroid_height=2400",
                  "androidboot.redroid_dpi=420",
                  "androidboot.redroid_fps=60"
                ],
                privileged: true,
                ports: ["5555:5555"]
              },
              persistent: ($persistent == "true")
            }')
          RESPONSE=$(curl -s -X POST "${{ secrets.KASM_API_URL }}/api/sessions" \
            -H "Content-Type: application/json" \
            -d "$PAYLOAD")
          SESSION_URL=$(echo "$RESPONSE" | jq -r '.session_url')
          SESSION_ID=$(echo "$RESPONSE" | jq -r '.session_id')
          echo "session_url=$SESSION_URL" >> $GITHUB_OUTPUT
          echo "session_id=$SESSION_ID" >> $GITHUB_OUTPUT

      - name: Show session info
        run: |
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Device: ${{ github.event.inputs.device_model }}"
          echo "📱 Android: ${{ github.event.inputs.android_version }}"
          echo "🌐 Web Interface: ${{ steps.deploy.outputs.session_url }}"
          echo "🔑 Session ID: ${{ steps.deploy.outputs.session_id }}"
          echo "================================================"

      - name: Keep alive
        run: sleep 3600

      - name: Cleanup
        if: always()
        run: |
          curl -X DELETE "${{ secrets.KASM_API_URL }}/api/sessions/${{ steps.deploy.outputs.session_id }}" \
            -H "Content-Type: application/json" \
            -d '{
              "api_key": "${{ secrets.KASM_API_KEY }}",
              "api_key_secret": "${{ secrets.KASM_API_SECRET }}"
            }' || echo "Session already terminated"
