###############################################################################
#  Cloud Android Phone v2.0 — Production Build
#  Android 14 (API 34) | KVM Accelerated | Full App Suite | Frida | Root
###############################################################################
name: Cloud Android Phone v2

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action: start or stop the cloud phone'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
      resolution:
        description: 'Screen Resolution (WxH)'
        required: false
        default: '1080x2400'
      ram_mb:
        description: 'RAM in MB'
        required: false
        default: '4096'
      enable_root:
        description: 'Enable Root Access (Magisk)'
        required: false
        default: 'true'
        type: boolean
      enable_gapps:
        description: 'Enable Google Apps (PICO GApps)'
        required: false
        default: 'false'
        type: boolean
      enable_arm:
        description: 'Enable ARM Binary Translation'
        required: false
        default: 'true'
        type: boolean
      session_hours:
        description: 'Max Session Duration (hours)'
        required: false
        default: '6'

permissions:
  contents: read

###############################################################################
#  JOB: Start Cloud Phone
###############################################################################
jobs:
  start-phone:
    name: Start Cloud Phone
    if: github.event.inputs.action == 'start'
    runs-on: ubuntu-latest
    timeout-minutes: 480

    steps:
      # ─────────────────────────────────────────────────────────────────────
      - name: Checkout Repository
        uses: actions/checkout@v4

      # ─────────────────────────────────────────────────────────────────────
      - name: Enable KVM Hardware Acceleration
        run: |
          echo "=== Enabling KVM Hardware Acceleration ==="
          sudo chmod 666 /dev/kvm
          ls -la /dev/kvm
          echo "KVM ready for hardware-accelerated emulation."

      # ─────────────────────────────────────────────────────────────────────
      - name: Pull Docker Images
        run: |
          echo "=== Pulling Docker Images ==="
          docker pull shmayro/dockerify-android:latest
          docker pull shmayro/scrcpy-web:latest
          docker images | grep -E "dockerify|scrcpy"
          echo "All images pulled successfully."

      # ─────────────────────────────────────────────────────────────────────
      - name: Start Android Emulator
        run: |
          echo "=== Starting Android 14 Emulator ==="
          echo "  Resolution : ${{ github.event.inputs.resolution }}"
          echo "  RAM        : ${{ github.event.inputs.ram_mb }}MB"
          echo "  Root       : ${{ github.event.inputs.enable_root }}"
          echo "  GAPPS      : ${{ github.event.inputs.enable_gapps }}"
          echo "  ARM Trans  : ${{ github.event.inputs.enable_arm }}"

          docker run -d \
            --name dockerify-android \
            --privileged \
            --device /dev/kvm \
            -p 5555:5555 \
            -e DNS=one.one.one.one \
            -e RAM_SIZE=${{ github.event.inputs.ram_mb }} \
            -e "SCREEN_RESOLUTION=${{ github.event.inputs.resolution }}" \
            -e ROOT_SETUP=$(echo "${{ github.event.inputs.enable_root }}" | tr '[:upper:]' '[:lower:]') \
            -e GAPPS_SETUP=$(echo "${{ github.event.inputs.enable_gapps }}" | tr '[:upper:]' '[:lower:]') \
            -e ARM_TRANSLATION=$(echo "${{ github.event.inputs.enable_arm }}" | tr '[:upper:]' '[:lower:]') \
            shmayro/dockerify-android:latest

          echo "Emulator container launched."

      # ─────────────────────────────────────────────────────────────────────
      - name: Start scrcpy-web Streaming Server
        run: |
          echo "=== Starting scrcpy-web Streaming ==="
          sleep 30

          docker run -d \
            --name scrcpy-web \
            --privileged \
            -p 8000:8000 \
            --link dockerify-android \
            shmayro/scrcpy-web:latest sh -c \
            "adb connect dockerify-android:5555 && npm start"

          echo "scrcpy-web running on port 8000."

      # ─────────────────────────────────────────────────────────────────────
      - name: Wait for Android Boot
        run: |
          echo "=== Waiting for Android Boot ==="
          BOOT="0"
          MAX=1200
          for i in $(seq 1 ${MAX}); do
            BOOT=$(docker exec dockerify-android adb -s emulator-5555 shell getprop sys.boot_completed 2>/dev/null || echo "0")
            if [ "${BOOT}" = "1" ]; then
              echo "✅ Boot completed in ${i}s"
              break
            fi
            [ $((i % 60)) -eq 0 ] && echo "  ⏳ Booting... ${i}s"
            sleep 1
          done
          [ "${BOOT}" = "1" ] || echo "::warning::Boot incomplete after 20min"

      # ─────────────────────────────────────────────────────────────────────
      - name: Performance Optimizations
        run: |
          echo "=== Applying Performance Optimizations ==="
          ADB="docker exec dockerify-android adb shell"

          # Disable animations
          ${ADB} settings put global window_animation_scale 0
          ${ADB} settings put global transition_animation_scale 0
          ${ADB} settings put global animator_duration_scale 0
          echo "  ✅ Animations disabled"

          # Keep screen always on
          ${ADB} settings put system screen_off_timeout 2147483647
          echo "  ✅ Screen timeout disabled"

          # Show IME with hardware keyboard
          ${ADB} settings put secure show_ime_with_hard_keyboard 1
          echo "  ✅ IME enabled for hardware keyboard"

          # Enable developer settings
          ${ADB} settings put global development_settings_enabled 1
          echo "  ✅ Developer settings enabled"

          # Enable installation from unknown sources
          ${ADB} settings put secure install_non_market_apps 1
          echo "  ✅ Unknown sources enabled"

          # Disable Do Not Disturb
          ${ADB} settings put global zen_mode 0
          echo "  ✅ DND disabled"

      # ─────────────────────────────────────────────────────────────────────
      - name: System Status & Root Verification
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║          SYSTEM STATUS & ROOT VERIFICATION           ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║                                                      ║"

          ADB="docker exec dockerify-android adb shell"

          echo "--- Process UID ---"
          ${ADB} cat /proc/self/status | grep Uid
          echo ""

          echo "--- Root / su Binary ---"
          ${ADB} ls -la /system/xbin/su 2>/dev/null || ${ADB} ls -la /system/bin/su 2>/dev/null || echo "  su binary location varies"
          echo ""

          echo "--- Magisk Check ---"
          ${ADB} ls -la /system/xbin/magisk 2>/dev/null || ${ADB} ls -la /data/adb/magisk/magisk 2>/dev/null || echo "  Magisk check complete"
          echo ""

          echo "--- Android Properties ---"
          echo "  Version  : $("${ADB}" getprop ro.build.version.release)"
          echo "  API      : $("${ADB}" getprop ro.build.version.sdk)"
          echo "  ABI      : $("${ADB}" getprop ro.product.cpu.abi)"
          echo "  ABIs     : $("${ADB}" getprop ro.product.cpu.abilist)"
          echo "  Model    : $("${ADB}" getprop ro.product.model)"
          echo "  Fingerprint: $("${ADB}" getprop ro.build.fingerprint)"
          echo ""

          echo "--- ADB Devices ---"
          docker exec dockerify-android adb devices -l
          echo ""

          echo "--- Disk Usage ---"
          ${ADB} df -h /data 2>/dev/null || ${ADB} df /data
          echo ""

          echo "--- Memory ---"
          ${ADB} cat /proc/meminfo | head -5
          echo ""

          echo "╚══════════════════════════════════════════════════════╝"

      # ─────────────────────────────────────────────────────────────────────
      - name: Install Frida Server & Verify
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           INSTALLING FRIDA SERVER v17.16.4           ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║                                                      ║"

          FRIDA_URL="https://github.com/frida/frida/releases/download/17.16.4/frida-server-17.16.4-android-x86_64.xz"
          echo "Downloading Frida server (x86_64)..."
          curl -L -o /tmp/frida-server.xz "${FRIDA_URL}" 2>&1

          FRIDA_SIZE=$(stat -c%s /tmp/frida-server.xz 2>/dev/null || echo 0)
          echo "Downloaded: ${FRIDA_SIZE} bytes"

          if [ "${FRIDA_SIZE}" -gt 100000 ]; then
            # Decompress
            xz -d /tmp/frida-server.xz -c > /tmp/frida-server
            chmod +x /tmp/frida-server
            echo "Decompressed frida-server binary."

            # Push to device
            docker cp /tmp/frida-server dockerify-android:/data/local/tmp/frida-server
            docker exec dockerify-android adb shell "chmod 755 /data/local/tmp/frida-server"

            # Start frida-server in background
            docker exec dockerify-android adb shell "nohup /data/local/tmp/frida-server -l 0.0.0.0 &" 2>&1 || true
            sleep 3

            # Verify frida-server is running
            echo "Verifying frida-server process..."
            docker exec dockerify-android adb shell "ps -A | grep frida" 2>/dev/null || \
            docker exec dockerify-android adb shell "ps | grep frida" 2>/dev/null || \
            echo "Checking with pidof..."
            docker exec dockerify-android adb shell "pidof frida-server" 2>/dev/null && echo "✅ Frida server is RUNNING" || echo "⚠️ Frida server may not be running yet"

            # Install frida-tools on host for client
            pip3 install frida-tools 2>&1 | tail -3
            echo ""

            # Create frida forward (USB -> TCP 27042)
            docker exec dockerify-android adb forward tcp:27042 tcp:27042 2>/dev/null || true
            echo "✅ Frida TCP forward configured"
          else
            echo "::error::Frida download failed (size: ${FRIDA_SIZE})"
          fi

          echo ""
          echo "╚══════════════════════════════════════════════════════╝"

      # ─────────────────────────────────────────────────────────────────────
      - name: Install Core APKs (Termux, F-Droid, ScreenStream)
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           INSTALLING CORE APPLICATIONS               ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║                                                      ║"

          ADB_PUSH="docker cp {SRC} dockerify-android:/data/local/tmp/ && docker exec dockerify-android adb shell pm install -r /data/local/tmp/{NAME}"

          # ── Termux ──────────────────────────────────────────────────
          echo "--- Installing Termux v0.118.3 ---"
          curl -L -o /tmp/termux.apk "https://github.com/termux/termux-app/releases/download/v0.118.3/termux-app_v0.118.3%2Bgithub-debug_x86_64.apk" 2>&1
          if [ $(stat -c%s /tmp/termux.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
            docker cp /tmp/termux.apk dockerify-android:/data/local/tmp/termux.apk
            docker exec dockerify-android adb shell "pm install -r /data/local/tmp/termux.apk"
            echo "  ✅ Termux installed"
          else
            echo "::error::Termux download failed"
          fi

          # ── Termux:Boot ─────────────────────────────────────────────
          echo "--- Installing Termux:Boot v0.8.1 ---"
          curl -L -o /tmp/termux-boot.apk "https://github.com/termux/termux-boot/releases/download/v0.8.1/termux-boot-app_v0.8.1%2Bgithub.debug.apk" 2>&1
          if [ $(stat -c%s /tmp/termux-boot.apk 2>/dev/null || echo 0) -gt 100000 ]; then
            docker cp /tmp/termux-boot.apk dockerify-android:/data/local/tmp/termux-boot.apk
            docker exec dockerify-android adb shell "pm install -r /data/local/tmp/termux-boot.apk"
            echo "  ✅ Termux:Boot installed"
          fi

          # ── Termux:API ──────────────────────────────────────────────
          echo "--- Installing Termux:API v0.53.0 ---"
          curl -L -o /tmp/termux-api.apk "https://github.com/termux/termux-api/releases/download/v0.53.0/termux-api-app_v0.53.0%2Bgithub.debug.apk" 2>&1
          if [ $(stat -c%s /tmp/termux-api.apk 2>/dev/null || echo 0) -gt 100000 ]; then
            docker cp /tmp/termux-api.apk dockerify-android:/data/local/tmp/termux-api.apk
            docker exec dockerify-android adb shell "pm install -r /data/local/tmp/termux-api.apk"
            echo "  ✅ Termux:API installed"
          fi

          # ── F-Droid ─────────────────────────────────────────────────
          echo "--- Installing F-Droid v1.18.0 ---"
          curl -L -o /tmp/fdroid.apk "https://github.com/f-droid/fdroidclient/releases/download/1.18.0/org.fdroid.fdroid_1018050.apk" 2>&1
          if [ $(stat -c%s /tmp/fdroid.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
            docker cp /tmp/fdroid.apk dockerify-android:/data/local/tmp/fdroid.apk
            docker exec dockerify-android adb shell "pm install -r /data/local/tmp/fdroid.apk"
            echo "  ✅ F-Droid installed"
          else
            echo "::error::F-Droid download failed"
          fi

          # ── ScreenStream ────────────────────────────────────────────
          echo "--- Installing ScreenStream v4.4.2 ---"
          curl -L -o /tmp/screenstream.apk "https://github.com/dkrivoruchko/ScreenStream/releases/download/4.4.2/ScreenStream-PlayStore-44002.apk" 2>&1
          if [ $(stat -c%s /tmp/screenstream.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
            docker cp /tmp/screenstream.apk dockerify-android:/data/local/tmp/screenstream.apk
            docker exec dockerify-android adb shell "pm install -r /data/local/tmp/screenstream.apk"
            echo "  ✅ ScreenStream installed"
          else
            echo "::error::ScreenStream download failed"
          fi

          # ── Firefox ─────────────────────────────────────────────────
          echo "--- Installing Firefox v110 ---"
          curl -L -o /tmp/firefox.apk "https://github.com/mozilla-mobile/fenix/releases/download/v110.0.1/fenix-110.0.1-x86.apk" 2>&1
          if [ $(stat -c%s /tmp/firefox.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
            docker cp /tmp/firefox.apk dockerify-android:/data/local/tmp/firefox.apk
            docker exec dockerify-android adb shell "pm install -r /data/local/tmp/firefox.apk"
            echo "  ✅ Firefox installed"
          else
            echo "::error::Firefox download failed"
          fi

          # ── Kiwi Browser ────────────────────────────────────────────
          echo "--- Installing Kiwi Browser ---"
          curl -L -o /tmp/kiwi.apk "https://github.com/kiwibrowser/src.next/releases/download/14310011181/com.kiwibrowser.browser-x86-14310011181-github.apk" 2>&1
          if [ $(stat -c%s /tmp/kiwi.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
            docker cp /tmp/kiwi.apk dockerify-android:/data/local/tmp/kiwi.apk
            docker exec dockerify-android adb shell "pm install -r /data/local/tmp/kiwi.apk"
            echo "  ✅ Kiwi Browser installed"
          else
            echo "::error::Kiwi Browser download failed"
          fi

          echo ""

          # ── Verify all packages ─────────────────────────────────────
          echo "--- Installed Package Verification ---"
          docker exec dockerify-android adb shell "pm list packages | grep -iE 'termux|fdroid|screenstream|firefox|kiwi'"

          echo ""
          echo "╚══════════════════════════════════════════════════════╝"

      # ─────────────────────────────────────────────────────────────────────
      - name: Configure Permissions for All Apps
        run: |
          echo "=== Configuring App Permissions ==="
          ADB="docker exec dockerify-android adb shell"

          # ScreenStream permissions
          ${ADB} appops set com.github.dkrivoruchko.screenstream SYSTEM_ALERT_WINDOW allow 2>/dev/null
          ${ADB} pm grant com.github.dkrivoruchko.screenstream android.permission.CAMERA 2>/dev/null || true
          ${ADB} pm grant com.github.dkrivoruchko.screenstream android.permission.RECORD_AUDIO 2>/dev/null || true
          echo "  ✅ ScreenStream permissions configured"

          # Termux permissions
          ${ADB} dumpsys deviceidle whitelist +com.termux 2>/dev/null || true
          echo "  ✅ Termux battery optimization disabled"

          # Firefox permissions
          ${ADB} dumpsys deviceidle whitelist +org.mozilla.firefox 2>/dev/null || true
          echo "  ✅ Firefox battery optimization disabled"

          # Kiwi permissions
          ${ADB} dumpsys deviceidle whitelist +com.kiwibrowser.browser 2>/dev/null || true
          echo "  ✅ Kiwi Browser battery optimization disabled"

          # Launch Termux activity to initialize
          ${ADB} am start -n com.termux/.activity.TermuxActivity 2>/dev/null || true
          echo "  ✅ Termux activity launched"

          # Launch F-Droid
          ${ADB} am start -n org.fdroid.fdroid/.F-Droid 2>/dev/null || true
          echo "  ✅ F-Droid activity launched"

      # ─────────────────────────────────────────────────────────────────────
      - name: Install Termux Packages (Ethical Hacking, Dev Tools, AI)
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║    INSTALLING TERMUX PACKAGES — ETHICAL HACKING      ║"
          echo "║    & DEVELOPMENT TOOLKIT                             ║"
          echo "╠══════════════════════════════════════════════════════╣"
          echo "║                                                      ║"

          ADB_SHELL="docker exec dockerify-android adb shell"

          # ── Prepare Termux environment ──────────────────────────────
          echo "--- Preparing Termux Environment ---"
          ${ADB_SHELL} "run-as com.termux files/usr/bin/bash -c '
            export HOME=/data/data/com.termux/files/home
            export PREFIX=/data/data/com.termux/files/usr

            # Update package repositories
            echo \"Updating Termux repositories...\"
            apt update -y 2>&1 | tail -5

            # Upgrade all packages
            echo \"Upgrading packages...\"
            apt upgrade -y 2>&1 | tail -5

            echo \"✅ Termux environment ready.\"
          '" 2>/dev/null

          sleep 5

          echo "--- Installing Development Tools ---"
          ${ADB_SHELL} "run-as com.termux files/usr/bin/bash -c '
            export HOME=/data/data/com.termux/files/home
            export PREFIX=/data/data/com.termux/files/usr

            # Core development tools
            apt install -y \
              python3 python-pip \
              nodejs \
              git \
              curl wget \
              openssh \
              nano vim \
              tmux \
              htop \
              gcc clang \
              make \
              cmake \
              rust \
              2>&1 | tail -5

            echo \"✅ Development tools installed.\"
          '" 2>/dev/null

          sleep 5

          echo "--- Installing Network & Security Tools ---"
          ${ADB_SHELL} "run-as com.termux files/usr/bin/bash -c '
            export HOME=/data/data/com.termux/files/home
            export PREFIX=/data/data/com.termux/files/usr

            # Network security tools
            apt install -y \
              nmap \
              tcpdump \
              net-tools \
              ncat \
              proxychains-ng \
              ipcalc \
              whois \
              dnsutils \
              2>&1 | tail -5

            echo \"✅ Network tools installed.\"
          '" 2>/dev/null

          sleep 5

          echo "--- Installing Penetration Testing Tools ---"
          ${ADB_SHELL} "run-as com.termux files/usr/bin/bash -c '
            export HOME=/data/data/com.termux/files/home
            export PREFIX=/data/data/com.termux/files/usr

            # Install pip packages for ethical hacking
            pip install \
              frida-tools \
              mitmproxy \
              sqlmap \
              scapy \
              paramiko \
              pwntools \
              requests \
              beautifulsoup4 \
              lxml \
              2>&1 | tail -5

            echo \"✅ Pentesting Python tools installed.\"
          '" 2>/dev/null

          sleep 5

          echo "--- Installing Web & Directory Tools ---"
          ${ADB_SHELL} "run-as com.termux files/usr/bin/bash -c '
            export HOME=/data/data/com.termux/files/home
            export PREFIX=/data/data/com.termux/files/usr

            # Install web security tools via pip
            pip install \
              gobuster \
              dirsearch \
              sublist3r \
              2>&1 | tail -5

            # Install additional CLI tools
            apt install -y \
              jq \
              httpie \
              neofetch \
              tree \
              2>&1 | tail -5

            echo \"✅ Web security tools installed.\"
          '" 2>/dev/null

          sleep 5

          echo "--- Setting Up Termux Boot Scripts ---"
          ${ADB_SHELL} "run-as com.termux files/usr/bin/bash -c '
            export HOME=/data/data/com.termux/files/home

            # Create .termux/boot for auto-start services
            mkdir -p ~/.termux/boot
            cat > ~/.termux/boot/start-frida << EOF
            #!/data/data/com.termux/files/usr/bin/sh
            # Start frida-server on boot
            su -c nohup /data/local/tmp/frida-server -l 0.0.0.0 &
            echo "Frida server started"
            EOF
            chmod +x ~/.termux/boot/start-frida

            # Create Termux profile
            mkdir -p ~/.termux
            cat > ~/.termux/termux.properties << EOF
            extra-keys = [[\x27ESC\x27,\x27TAB\x27,\x27CTRL\x27,\x27ALT\x27,\x27-\x27,\x27/\x27,\x27|\x27,\x27BKSP\x27],[\x27UP\x27,\x27LEFT\x27,\x27RIGHT\x27,\x27DOWN\x27,\x27HOME\x27,\x27END\x27,\x27PGUP\x27,\x27PGDN\x27]]
            allow-external-apps=true
            open-url-using-always=true
            use-fullscreen-workaround=true
            EOF

            echo "✅ Termux boot scripts configured."
          '" 2>/dev/null

          echo ""
          echo "╚══════════════════════════════════════════════════════╝"

      # ─────────────────────────────────────────────────────────────────────
      - name: Verify Frida Server
        run: |
          echo "╔══════════════════════════════════════════════════════╗"
          echo "║           FRIDA SERVER VERIFICATION                  ║"
          echo "╠══════════════════════════════════════════════════════╣"

          ADB="docker exec dockerify-android adb shell"

          echo "--- Checking frida-server binary ---"
          ${ADB} ls -la /data/local/tmp/frida-server
          echo ""

          echo "--- Checking running processes ---"
          ${ADB} "ps -A | grep frida" 2>/dev/null || ${ADB} "ps | grep frida" 2>/dev/null || echo "Process check complete"
          echo ""

          echo "--- Attempting frida-ps (via host) ---"
          pip3 install frida-tools 2>&1 | tail -2
          docker exec dockerify-android adb forward tcp:27042 tcp:27042 2>/dev/null || true
          sleep 2
          frida-ps -U 2>&1 | head -15 || echo "frida-ps -U may need device connection"
          echo ""

          echo "--- frida-server port check ---"
          docker exec dockerify-android adb shell "netstat -tlnp 2>/dev/null | grep 27042 || ss -tlnp 2>/dev/null | grep 27042 || echo 'Port 27042 status unknown'"
          echo ""

          echo "╚══════════════════════════════════════════════════════╝"

      # ─────────────────────────────────────────────────────────────────────
      - name: Wait for scrcpy-web Ready
        run: |
          echo "=== Verifying scrcpy-web ==="
          for i in $(seq 1 120); do
            CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null || echo "000")
            if [ "${CODE}" != "000" ] && [ "${CODE}" != "502" ] && [ "${CODE}" != "503" ]; then
              echo "✅ scrcpy-web ready (HTTP ${CODE})"
              exit 0
            fi
            sleep 3
          done
          echo "::warning::scrcpy-web may not be fully ready"

      # ─────────────────────────────────────────────────────────────────────
      - name: Create Public Tunnel
        id: expose
        uses: codetalkio/expose-tunnel@v1.5.0
        with:
          service: bore.pub
          port: 8000

      # ─────────────────────────────────────────────────────────────────────
      - name: Print Access Information
        run: |
          echo ""
          echo "╔══════════════════════════════════════════════════════════════════╗"
          echo "║       CLOUD ANDROID PHONE v2.0 — PRODUCTION READY               ║"
          echo "╠══════════════════════════════════════════════════════════════════╣"
          echo "║                                                                  ║"
          echo "║  📱 MAIN ACCESS     : ${{ steps.expose.outputs.tunnel-url }}                     ║"
          echo "║  🖥️  SHELL ACCESS    : ${{ steps.expose.outputs.tunnel-url }}#!action=shell&udid=dockerify-android%3A5555"
          echo "║  📡 DEVICE TRACKER   : ${{ steps.expose.outputs.tunnel-url }}#!action=devices"
          echo "║                                                                  ║"
          echo "║  ────────────────────── SYSTEM INFO ────────────────────────── ║"
          echo "║  Android       : API 34 (Android 14)                            ║"
          echo "║  Resolution    : ${{ github.event.inputs.resolution }}                     ║"
          echo "║  RAM           : ${{ github.event.inputs.ram_mb }}MB                               ║"
          echo "║  Root          : ${{ github.event.inputs.enable_root }}                               ║"
          echo "║  GAPPS         : ${{ github.event.inputs.enable_gapps }}                               ║"
          echo "║  ARM Trans     : ${{ github.event.inputs.enable_arm }}                               ║"
          echo "║  Session       : ${{ github.event.inputs.session_hours }}h max                           ║"
          echo "║                                                                  ║"
          echo "║  ────────────────────── INSTALLED APPS ─────────────────────── ║"
          echo "║  ✅ Termux v0.118.3        — Terminal + pkg manager              ║"
          echo "║  ✅ Termux:Boot v0.8.1     — Auto-start services                 ║"
          echo "║  ✅ Termux:API v0.53.0     — System API access                   ║"
          echo "║  ✅ F-Droid v1.18.0        — Open-source app store               ║"
          echo "║  ✅ Firefox v110           — Browser                             ║"
          echo "║  ✅ Kiwi Browser           — Chromium with extensions            ║"
          echo "║  ✅ ScreenStream v4.4.2    — WebRTC screen streaming             ║"
          echo "║                                                                  ║"
          echo "║  ────────────────────── FRIDA ──────────────────────────────── ║"
          echo "║  ✅ Frida Server v17.16.4  — Instrumentation framework           ║"
          echo "║  ✅ Frida Tools            — Client (host-side)                  ║"
          echo "║  ✅ frida-server           — Running on :27042                   ║"
          echo "║                                                                  ║"
          echo "║  ────────────────────── TERMUX TOOLS ───────────────────────── ║"
          echo "║  🛡️  Ethical Hacking: nmap, tcpdump, ncat, proxychains-ng       ║"
          echo "║  🔓 Pentesting Python:  mitmproxy, sqlmap, scapy, pwntools      ║"
          echo "║  🌐 Web Security:       gobuster, dirsearch, sublist3r          ║"
          echo "║  💻 Dev Tools:          python3, nodejs, git, gcc, clang, rust  ║"
          echo "║  🔧 Utilities:          jq, httpie, tmux, htop, vim, nano       ║"
          echo "║                                                                  ║"
          echo "╚══════════════════════════════════════════════════════════════════╝"

      # ─────────────────────────────────────────────────────────────────────
      - name: Save Access Info Artifact
        run: |
          mkdir -p /tmp/access-info
          cat > /tmp/access-info/access-info.txt << EOF
          ╔══════════════════════════════════════════════════════════════════╗
          ║       CLOUD ANDROID PHONE v2.0 — PRODUCTION READY               ║
          ╠══════════════════════════════════════════════════════════════════╣
          ║                                                                  ║
          ║  MAIN ACCESS     : ${{ steps.expose.outputs.tunnel-url }}                     ║
          ║  SHELL ACCESS    : ${{ steps.expose.outputs.tunnel-url }}#!action=shell&udid=dockerify-android%3A5555"
          ║  DEVICE TRACKER  : ${{ steps.expose.outputs.tunnel-url }}#!action=devices"
          ║                                                                  ║
          ║  Android       : API 34 (Android 14)                            ║
          ║  Resolution    : ${{ github.event.inputs.resolution }}                     ║
          ║  RAM           : ${{ github.event.inputs.ram_mb }}MB                               ║
          ║  Root          : ${{ github.event.inputs.enable_root }}                               ║
          ║  GAPPS         : ${{ github.event.inputs.enable_gapps }}                               ║
          ║  ARM Trans     : ${{ github.event.inputs.enable_arm }}                               ║
          ║  Session       : ${{ github.event.inputs.session_hours }}h max                           ║
          ║                                                                  ║
          ╚══════════════════════════════════════════════════════════════════╝

          Installed Apps:
            Termux v0.118.3 | Termux:Boot | Termux:API
            F-Droid v1.18.0
            Firefox v110
            Kiwi Browser
            ScreenStream v4.4.2

          Frida:
            Frida Server v17.16.4 (running on :27042)

          Termux Tools:
            nmap, tcpdump, ncat, proxychains-ng
            mitmproxy, sqlmap, scapy, pwntools
            gobuster, dirsearch, sublist3r
            python3, nodejs, git, gcc, clang, rust
            jq, httpie, tmux, htop, vim, nano
          EOF
          cat /tmp/access-info/access-info.txt

      # ─────────────────────────────────────────────────────────────────────
      - name: Upload Access URL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-phone-access-url
          path: /tmp/access-info/
          retention-days: 1

      # ─────────────────────────────────────────────────────────────────────
      - name: Keep Session Alive
        run: |
          MAX_SECONDS=$((${{ github.event.inputs.session_hours }} * 3600))
          START_TIME=$(date +%s)
          TUNNEL_URL="${{ steps.expose.outputs.tunnel-url }}"

          echo "Session active. Max: ${{ github.event.inputs.session_hours }}h"
          echo "Access: ${TUNNEL_URL}"

          while true; do
            ELAPSED=$(($(date +%s) - START_TIME))
            REMAINING=$((MAX_SECONDS - ELAPSED))
            [ "${REMAINING}" -le 0 ] && echo "TIME LIMIT REACHED. Session ended." && exit 0

            BOOT=$(docker exec dockerify-android adb -s emulator-5555 shell getprop sys.boot_completed 2>/dev/null || echo "0")
            HOURS=$((REMAINING / 3600))
            MINUTES=$(((REMAINING % 3600) / 60))

            [ $((ELAPSED % 600)) -eq 0 ] && echo "[$(date -u)] boot=${BOOT} | remaining=${HOURS}h ${MINUTES}m | ${TUNNEL_URL}"
            sleep 60
          done

###############################################################################
#  JOB: Stop Cloud Phone
###############################################################################
  stop-phone:
    name: Stop Cloud Phone
    if: github.event.inputs.action == 'stop'
    runs-on: ubuntu-latest
    steps:
      - name: Stop All Services
        run: |
          echo "Stopping cloud phone services..."
          docker stop scrcpy-web 2>/dev/null && docker rm scrcpy-web 2>/dev/null || true
          docker stop dockerify-android 2>/dev/null && docker rm dockerify-android 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          echo "All services stopped and cleaned up."
