name: Rooted Android Cloud Phone
on:
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Restore previous session
        if: github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Start Android emulator (no KVM required)
        run: |
          mkdir -p ./android-data
          docker run -d --name android-emulator \
            --privileged \
            -v $(pwd)/android-data:/data \
            -v $(pwd)/android-data:/home/androidusr \
            -p 5555:5555 \
            -p 8000:8000 \
            shmayro/dockerify-android:latest

      - name: Wait for emulator to boot
        run: |
          echo "⏳ Waiting for emulator to boot (2-3 minutes)..."
          for i in {1..90}; do
            if docker exec android-emulator adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "✅ Emulator booted!"
              break
            fi
            echo "⏳ Attempt $i/90..."
            sleep 10
          done

      - name: Connect ADB and wait for device
        run: |
          echo "⏳ Connecting ADB to emulator..."
          docker exec android-emulator adb connect localhost:5555
          for i in {1..30}; do
            if docker exec android-emulator adb devices | grep -q "emulator"; then
              echo "✅ ADB connected"
              docker exec android-emulator adb devices
              break
            fi
            echo "⏳ Attempt $i/30..."
            sleep 3
          done

      - name: Install Frida server (x86_64) via ADB
        run: |
          SERIAL=$(docker exec android-emulator adb devices | grep emulator | head -1 | awk '{print $1}')
          echo "Targeting device: $SERIAL"
          
          echo "Downloading Frida server..."
          curl -L -o frida-server-17.1.3-android-x86_64.xz \
            https://github.com/frida/frida/releases/download/17.1.3/frida-server-17.1.3-android-x86_64.xz
          if [ ! -f frida-server-17.1.3-android-x86_64.xz ]; then
            echo "❌ Download failed"
            exit 1
          fi
          echo "✅ Download complete"
          
          echo "Extracting..."
          unxz -v frida-server-17.1.3-android-x86_64.xz
          echo "✅ Extraction complete"
          
          echo "Copying to container..."
          docker cp frida-server-17.1.3-android-x86_64 android-emulator:/tmp/frida-server
          
          echo "Pushing to emulator via ADB..."
          docker exec android-emulator adb -s $SERIAL push /tmp/frida-server /data/local/tmp/frida-server
          
          echo "Verifying file on emulator..."
          docker exec android-emulator adb -s $SERIAL shell ls -l /data/local/tmp/frida-server
          
          echo "Setting permissions..."
          docker exec android-emulator adb -s $SERIAL shell chmod +x /data/local/tmp/frida-server
          
          echo "Starting Frida on emulator..."
          docker exec android-emulator adb -s $SERIAL shell "nohup /data/local/tmp/frida-server > /dev/null 2>&1 &"
          sleep 3
          
          echo "Checking if Frida is running..."
          docker exec android-emulator adb -s $SERIAL shell "ps | grep frida-server" || true
          
          echo "✅ Frida server installed and started"

      - name: Start scrcpy-web interface
        run: |
          echo "Starting scrcpy-web on port 8000..."
          # scrcpy-web is installed in /home/androidusr/bin or similar
          docker exec -d android-emulator bash -c "cd /home/androidusr && scrcpy-web --port 8000"
          echo "⏳ Waiting for web server to start..."
          for i in {1..20}; do
            if docker exec android-emulator curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200"; then
              echo "✅ Web server ready!"
              break
            fi
            echo "⏳ Attempt $i/20..."
            sleep 3
          done
          # If still not ready, print logs
          if ! docker exec android-emulator curl -s http://localhost:8000 > /dev/null; then
            echo "⚠️ Web server may not be running. Checking processes..."
            docker exec android-emulator ps aux | grep scrcpy || true
          fi

      - name: Expose via NPort with authentication
        id: tunnel
        run: |
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          echo "auth-pass=$AUTH_PASS" >> $GITHUB_OUTPUT
          npx nport 8000 -s urban-phone --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          echo $! > nport.pid
          sleep 15
          TUNNEL_URL="https://urban-phone.nport.link"
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Display connection info
        run: |
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Web Interface: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔑 Auth: admin:${{ steps.tunnel.outputs.auth-pass }}"
          echo "🔌 ADB: adb connect localhost:5555"
          echo "🔑 Root: Yes (Magisk preinstalled)"
          echo "🛠️  Frida: Running on port 27042"
          echo "================================================"

      - name: Keep alive
        run: sleep 340m

      - name: Save session
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data
          retention-days: 90

      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop android-emulator || true
          docker rm android-emulator || true
