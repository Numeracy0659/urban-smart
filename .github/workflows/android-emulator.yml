name: Cloud Android Phone (WebRTC - ScreenStream)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  phone:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      # ==============================================================
      # 1. Install dependencies
      # ==============================================================
      - name: Install ADB and kernel modules
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb linux-modules-extra-$(uname -r)

      # ==============================================================
      # 2. Load kernel modules for Redroid
      # ==============================================================
      - name: Load kernel modules
        run: |
          sudo modprobe binder_linux devices="binder,hwbinder,vndbinder"
          sudo modprobe ashmem_linux || true

      # ==============================================================
      # 3. Session persistence (restore)
      # ==============================================================
      - name: Restore session data (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Restore session data (push)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            tar -xzf ./android-data/data.tar.gz -C ./android-data/
            rm -f ./android-data/data.tar.gz
          fi

      # ==============================================================
      # 4. Create the setup script (all in one)
      # ==============================================================
      - name: Create setup script
        run: |
          cat > setup.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          echo "================================================"
          echo "📱 STARTING REDROID WITH WEBRTC (SCREENSTREAM)"
          echo "================================================"

          # --------------------------------------------
          # Start Redroid container (Android 14, 64-bit only)
          # --------------------------------------------
          echo "🚀 Starting Redroid container..."
          docker run -d --name redroid \
            --privileged \
            -v $(pwd)/android-data:/data \
            -p 5555:5555 \
            redroid/redroid:14.0.0_64only-latest \
            androidboot.redroid_gpu_mode=guest \
            androidboot.redroid_width=1080 \
            androidboot.redroid_height=2400 \
            androidboot.redroid_dpi=420 \
            androidboot.redroid_fps=60 \
            androidboot.use_memfd=true

          echo "⏳ Waiting for Redroid to boot..."
          sleep 30

          # Reset ADB and connect
          adb kill-server
          adb start-server

          for i in {1..30}; do
            if adb connect localhost:5555 2>/dev/null | grep -q 'connected'; then
              echo "✅ ADB connected"
              break
            fi
            sleep 5
          done

          for i in {1..30}; do
            if adb -s localhost:5555 shell "echo ready" 2>/dev/null | grep -q "ready"; then
              echo "✅ Device fully ready"
              break
            fi
            sleep 5
          done

          adb devices

          # --------------------------------------------
          # Enable ARM translation (needed for ScreenStream APK)
          # --------------------------------------------
          echo "🔧 Enabling ARM translation..."
          adb -s localhost:5555 shell setprop persist.sys.nativebridge 1
          adb -s localhost:5555 shell setprop persist.sys.nativebridge.enable 1

          # --------------------------------------------
          # Download and install ScreenStream APK
          # --------------------------------------------
          echo "📥 Downloading ScreenStream APK..."
          wget -O screenstream.apk https://github.com/dkrivoruchko/ScreenStream/releases/latest/download/app-release.apk
          adb -s localhost:5555 install screenstream.apk

          # --------------------------------------------
          # Launch ScreenStream and start WebRTC streaming
          # --------------------------------------------
          echo "📱 Launching ScreenStream..."
          adb -s localhost:5555 shell am start -n info.dvkr.screenstream/.MainActivity
          sleep 5

          # Grant permissions (MEDIA_PROJECTION, etc.)
          adb -s localhost:5555 shell pm grant info.dvkr.screenstream android.permission.ACCESS_FINE_LOCATION
          adb -s localhost:5555 shell pm grant info.dvkr.screenstream android.permission.RECORD_AUDIO

          # Start screen capture via WebRTC mode
          # ScreenStream uses the default WebRTC signaling server at screenstream.io
          # We just need to start streaming – the app will show a stream URL.
          adb -s localhost:5555 shell am start -n info.dvkr.screenstream/.MainActivity --es mode webrtc

          echo "⏳ Waiting for ScreenStream to generate stream URL..."
          sleep 10

          # Get the stream URL from logcat
          STREAM_URL=$(adb -s localhost:5555 logcat -d | grep -o 'https://screenstream.io/stream/[^ ]*' | head -1)
          if [ -z "$STREAM_URL" ]; then
            # Fallback: try to get it from the app's shared preferences or UI
            # In the worst case, we'll instruct the user to check the app.
            echo "⚠️ Could not auto-detect stream URL. Please check the app manually."
            STREAM_URL="https://screenstream.io/"
          fi

          echo "📡 WebRTC Stream URL: $STREAM_URL"

          # --------------------------------------------
          # Start NPort tunnel (optional – ScreenStream uses public signaling)
          # --------------------------------------------
          # ScreenStream uses its own public signaling server, so we don't need to tunnel the WebRTC stream.
          # However, we might want to expose an admin page or the Android UI for debugging.
          # We'll still start an NPort tunnel to the ADB port for fallback.
          echo "🔗 Starting NPort tunnel for ADB fallback..."
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          npx nport 5555 -s cloud-phone-adb --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          NPORT_PID=$!
          echo $NPORT_PID > nport.pid

          echo "⏳ Waiting for tunnel to be live..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://cloud-phone-adb.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://cloud-phone-adb.nport.link"

          # --------------------------------------------
          # Display connection information
          # --------------------------------------------
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Android 14 (64-bit) with WebRTC streaming"
          echo "📱 WebRTC Stream: $STREAM_URL"
          echo "   (Open in any WebRTC-enabled browser)"
          echo "   The stream may require a password (default: none)"
          echo ""
          echo "🔌 ADB Fallback (via NPort): $TUNNEL_URL"
          echo "🔑 Auth: admin:$AUTH_PASS"
          echo "================================================"
          echo ""
          echo "To control the phone:"
          echo "  1. Open the WebRTC stream URL in a browser"
          echo "  2. The ScreenStream interface allows mouse/touch control"
          echo ""
          echo "To use ADB locally:"
          echo "  adb connect $TUNNEL_URL:5555"
          echo "  scrcpy -s $TUNNEL_URL:5555"
          echo ""
          echo "================================================"

          # --------------------------------------------
          # Keep alive for the entire job duration
          # --------------------------------------------
          echo "⏳ Keeping phone alive for 340 minutes..."
          sleep 340m
          SCRIPT

          chmod +x setup.sh

      # ==============================================================
      # 5. Run the setup script
      # ==============================================================
      - name: Run Redroid setup
        run: bash setup.sh

      # ==============================================================
      # 6. Save session (encrypt and upload artifact)
      # ==============================================================
      - name: Save session
        if: always()
        run: |
          if [ -d ./android-data ] && [ "$(ls -A ./android-data)" ]; then
            echo "📦 Creating backup..."
            tar -czf data.tar.gz -C ./android-data .
            if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' }}" == "true" ]; then
              gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -c data.tar.gz
              mv data.tar.gz.gpg ./android-data/
              rm -f data.tar.gz
              echo "✅ Backup encrypted"
            else
              mv data.tar.gz ./android-data/
              echo "✅ Backup created"
            fi
          else
            echo "⚠️ No data to save"
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/*
          retention-days: 90

      # ==============================================================
      # 7. Cleanup (always runs)
      # ==============================================================
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop redroid 2>/dev/null || true
          docker rm redroid 2>/dev/null || true
