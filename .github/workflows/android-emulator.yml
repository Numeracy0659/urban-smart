      - name: Install Frida server
        run: |
          SERIAL=$(docker exec dockerify-android adb devices | grep emulator | head -1 | awk '{print $1}')
          echo "Target: $SERIAL"
          curl -L -o frida-server-17.1.3-android-x86_64.xz \
            https://github.com/frida/frida/releases/download/17.1.3/frida-server-17.1.3-android-x86_64.xz
          unxz frida-server-17.1.3-android-x86_64.xz
          docker cp frida-server-17.1.3-android-x86_64 dockerify-android:/tmp/frida-server
          docker exec dockerify-android adb -s $SERIAL push /tmp/frida-server /data/local/tmp/frida-server
          docker exec dockerify-android adb -s $SERIAL shell chmod +x /data/local/tmp/frida-server
          # Use adb root for Frida too
          docker exec dockerify-android adb root
          docker exec dockerify-android adb -s $SERIAL shell "nohup /data/local/tmp/frida-server > /dev/null 2>&1 &"
          sleep 3
          if docker exec dockerify-android adb -s $SERIAL shell "ps -A | grep frida-server" | grep -q frida; then
            echo "✅ Frida is running"
          else
            echo "⚠️ Frida not detected, but continuing..."
          fi

      - name: Configure Pixel 8 Pro build.prop
        run: |
          echo "📱 Configuring device as Google Pixel 8 Pro..."
          SERIAL=$(docker exec dockerify-android adb devices | grep emulator | head -1 | awk '{print $1}')
          
          # Elevate ADB to root (bypasses su entirely)
          docker exec dockerify-android adb root
          sleep 2
          
          # Remount root as read-write
          docker exec dockerify-android adb -s $SERIAL shell mount -o rw,remount /
          
          # Backup original
          docker exec dockerify-android adb -s $SERIAL shell cp /system/build.prop /system/build.prop.backup
          
          # Add Pixel 8 Pro properties
          docker exec dockerify-android adb -s $SERIAL shell "echo 'ro.product.model=Pixel 8 Pro' >> /system/build.prop"
          docker exec dockerify-android adb -s $SERIAL shell "echo 'ro.product.brand=Google' >> /system/build.prop"
          docker exec dockerify-android adb -s $SERIAL shell "echo 'ro.product.manufacturer=Google' >> /system/build.prop"
          docker exec dockerify-android adb -s $SERIAL shell "echo 'ro.product.name=husky' >> /system/build.prop"
          docker exec dockerify-android adb -s $SERIAL shell "echo 'ro.product.device=husky' >> /system/build.prop"
          docker exec dockerify-android adb -s $SERIAL shell "echo 'ro.build.product=husky' >> /system/build.prop"
          
          # Set permissions and remount read-only
          docker exec dockerify-android adb -s $SERIAL shell chmod 644 /system/build.prop
          docker exec dockerify-android adb -s $SERIAL shell mount -o ro,remount /
          
          echo "✅ Pixel 8 Pro profile applied. Rebooting emulator..."
          docker exec dockerify-android adb -s $SERIAL shell reboot
          
          # Wait for reboot
          sleep 30
          for i in {1..60}; do
            if docker exec dockerify-android adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "✅ Emulator rebooted with Pixel 8 Pro profile"
              break
            fi
            sleep 5
          done

