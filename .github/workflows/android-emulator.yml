name: Rooted Android Cloud Phone (Final)
on:
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 355
    steps:
      - uses: actions/checkout@v4

      # ----------------------------------------------------------------------
      # 1. Restore session (decrypt and extract inside container)
      # ----------------------------------------------------------------------
      - name: Restore session data
        if: github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (if encrypted)
        if: github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            echo "✅ Decrypted"
          fi

      # ----------------------------------------------------------------------
      # 2. Launch emulator container with volumes
      # ----------------------------------------------------------------------
      - name: Start Android emulator
        run: |
          mkdir -p ./android-data
          docker run -d --name android-emulator \
            --privileged \
            -v $(pwd)/android-data:/data \
            -v $(pwd)/android-data:/home/androidusr \
            -p 5555:5555 \
            shmayro/dockerify-android:latest

      - name: Restore data inside container (if persist)
        if: github.event.inputs.persist == 'yes' && github.event.inputs.encrypt != 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz ]; then
            docker cp ./android-data/data.tar.gz android-emulator:/tmp/
            docker exec android-emulator tar xzf /tmp/data.tar.gz -C /data
            docker exec android-emulator rm -f /tmp/data.tar.gz
            echo "✅ Restored session"
          fi

      - name: Wait for emulator to boot
        run: |
          echo "⏳ Waiting for boot completion..."
          for i in {1..90}; do
            if docker exec android-emulator adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "✅ Emulator booted"
              break
            fi
            sleep $(( i < 30 ? 5 : i < 60 ? 10 : 15 ))
          done

      - name: Connect ADB and wait for device
        run: |
          echo "⏳ Connecting ADB..."
          docker exec android-emulator adb connect localhost:5555
          for i in {1..40}; do
            if docker exec android-emulator adb devices | grep -q "emulator"; then
              echo "✅ ADB ready"
              docker exec android-emulator adb devices
              break
            fi
            sleep 3
          done

      # ----------------------------------------------------------------------
      # 3. Install & run Frida (as root on emulator)
      # ----------------------------------------------------------------------
      - name: Install Frida server
        run: |
          SERIAL=$(docker exec android-emulator adb devices | grep emulator | head -1 | awk '{print $1}')
          echo "Target: $SERIAL"
          # Download with original name
          curl -L -o frida-server-17.1.3-android-x86_64.xz \
            https://github.com/frida/frida/releases/download/17.1.3/frida-server-17.1.3-android-x86_64.xz
          unxz frida-server-17.1.3-android-x86_64.xz
          # Now file is frida-server-17.1.3-android-x86_64
          docker cp frida-server-17.1.3-android-x86_64 android-emulator:/tmp/frida-server
          docker exec android-emulator adb -s $SERIAL push /tmp/frida-server /data/local/tmp/frida-server
          docker exec android-emulator adb -s $SERIAL shell chmod +x /data/local/tmp/frida-server
          docker exec android-emulator adb -s $SERIAL shell "su -c 'nohup /data/local/tmp/frida-server > /dev/null 2>&1 &'"
          sleep 3
          if docker exec android-emulator adb -s $SERIAL shell "ps -A | grep frida-server" | grep -q frida; then
            echo "✅ Frida is running"
          else
            echo "⚠️ Frida not detected, but continuing..."
          fi

      # ----------------------------------------------------------------------
      # 4. Launch scrcpy-web container
      # ----------------------------------------------------------------------
      - name: Start scrcpy-web container
        run: |
          docker run -d --name scrcpy-web \
            --privileged \
            -p 8000:8000 \
            shmayro/scrcpy-web:latest \
            sh -c "
              for i in {1..30}; do
                if adb connect android-emulator:5555 2>/dev/null | grep -q 'connected'; then
                  break
                fi
                sleep 2
              done
              npm start
            "

      - name: Verify scrcpy-web is serving
        run: |
          echo "⏳ Waiting for web server on port 8000..."
          for i in {1..40}; do
            if docker exec scrcpy-web curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200"; then
              echo "✅ Web server ready"
              break
            fi
            sleep 3
          done

      # ----------------------------------------------------------------------
      # 5. Expose via NPort
      # ----------------------------------------------------------------------
      - name: Start NPort tunnel
        id: tunnel
        run: |
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          echo "auth-pass=$AUTH_PASS" >> $GITHUB_OUTPUT
          npx nport 8000 -s urban-phone --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          echo $! > nport.pid
          echo "⏳ Waiting for tunnel to be live..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://urban-phone.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://urban-phone.nport.link"
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Display info
        run: |
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Web Interface: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔑 Auth: admin:${{ steps.tunnel.outputs.auth-pass }}"
          echo "🔌 ADB (fallback): ${{ steps.tunnel.outputs.tunnel-url }}:5555 (via NPort)"
          echo "🔑 Root: Yes (Magisk preinstalled)"
          echo "🛠️  Frida: Running on emulator (port 27042)"
          echo "================================================"
          echo "To use ADB locally:"
          echo "  adb connect ${{ steps.tunnel.outputs.tunnel-url }}:5555"
          echo "  adb forward tcp:27042 tcp:27042"
          echo "  frida -H localhost:27042 com.moon.tools -l scripts/hook_zapero.js"

      # ----------------------------------------------------------------------
      # 6. Keep alive and save session (inside container)
      # ----------------------------------------------------------------------
      - name: Keep alive
        run: sleep 340m

      - name: Save session (tar from inside container)
        if: always()
        run: |
          # Create tar inside container (as root) to avoid permission issues
          docker exec android-emulator tar czf /tmp/data.tar.gz -C /data .
          # Copy tar to runner
          docker cp android-emulator:/tmp/data.tar.gz ./android-data/
          if [ "${{ github.event.inputs.encrypt }}" == "yes" ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -c ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data
          retention-days: 90

      # ----------------------------------------------------------------------
      # 7. Cleanup
      # ----------------------------------------------------------------------
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop android-emulator scrcpy-web 2>/dev/null || true
          docker rm android-emulator scrcpy-web 2>/dev/null || true
