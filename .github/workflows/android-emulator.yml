name: Rooted Android Cloud Phone (Professional)
on:
  push:
    branches: [ main ]
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no
      encrypt:
        description: 'Encrypt session data? (GPG)'
        required: false
        default: 'no'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 355

    steps:
      - uses: actions/checkout@v4

      # ============================================================
      # PHASE 1: KVM HARDWARE ACCELERATION
      # ============================================================
      - name: Enable KVM group permissions
        run: |
          echo 'KERNEL=="kvm", GROUP="kvm", MODE="0666", OPTIONS+="static_node=kvm"' | sudo tee /etc/udev/rules.d/99-kvm4all.rules
          sudo udevadm control --reload-rules
          sudo udevadm trigger --name-match=kvm

      - name: Verify KVM
        run: |
          ls -l /dev/kvm
          sudo apt-get update
          sudo apt-get install -y cpu-checker
          kvm-ok

      # ============================================================
      # PHASE 2: INSTALL HOST ADB
      # ============================================================
      - name: Install ADB tools on host
        run: |
          sudo apt-get update
          sudo apt-get install -y android-tools-adb

      # ============================================================
      # PHASE 3: SESSION RESTORATION (if any)
      # ============================================================
      - name: Restore session data (manual)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Restore session data (push)
        if: github.event_name == 'push'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Decrypt session (manual only)
        if: github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' && github.event.inputs.persist == 'yes'
        run: |
          if [ -f ./android-data/data.tar.gz.gpg ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -d ./android-data/data.tar.gz.gpg > ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz.gpg
            echo "✅ Decrypted"
          fi

      # ============================================================
      # PHASE 4: AVD CACHE
      # ============================================================
      - name: Cache AVD snapshot
        uses: actions/cache@v4
        id: avd-cache
        with:
          path: |
            ~/.android/avd/*
            ~/.android/adb*
          key: avd-${{ runner.os }}-api33-x86_64-google_apis
          restore-keys: |
            avd-${{ runner.os }}-api33-x86_64-

      # ============================================================
      # PHASE 5: CREATE THE SETUP SCRIPT (single file)
      # ============================================================
      - name: Create setup script
        run: |
          cat > setup.sh << 'SCRIPT'
          #!/bin/bash
          set -e

          SERIAL="emulator-5554"

          echo "================================================"
          echo "📱 EMULATOR IS READY. STARTING SETUP..."
          echo "================================================"

          # ------------------------------------------------------------------
          # Elevate ADB to root
          # ------------------------------------------------------------------
          echo "🔑 Elevating ADB to root..."
          adb -s $SERIAL root
          sleep 3

          # ------------------------------------------------------------------
          # Remount system as writable (system is already writable due to -writable-system)
          # ------------------------------------------------------------------
          echo "🔧 Remounting system as writable..."
          adb -s $SERIAL shell mount -o rw,remount /

          # ------------------------------------------------------------------
          # Verify writability
          # ------------------------------------------------------------------
          echo "📌 Verifying system is writable..."
          if adb -s $SERIAL shell "touch /system/test_write 2>/dev/null"; then
            adb -s $SERIAL shell "rm /system/test_write"
            echo "✅ System partition is writable!"
          else
            echo "❌ System partition is still read-only. Exiting."
            exit 1
          fi

          # ------------------------------------------------------------------
          # Configure Pixel 8 Pro build.prop
          # ------------------------------------------------------------------
          echo "📱 Configuring device as Google Pixel 8 Pro..."
          adb -s $SERIAL shell cp /system/build.prop /system/build.prop.backup
          adb -s $SERIAL shell "su 0 sh -c \"echo 'ro.product.model=Pixel 8 Pro' >> /system/build.prop\""
          adb -s $SERIAL shell "su 0 sh -c \"echo 'ro.product.brand=Google' >> /system/build.prop\""
          adb -s $SERIAL shell "su 0 sh -c \"echo 'ro.product.manufacturer=Google' >> /system/build.prop\""
          adb -s $SERIAL shell "su 0 sh -c \"echo 'ro.product.name=husky' >> /system/build.prop\""
          adb -s $SERIAL shell "su 0 sh -c \"echo 'ro.product.device=husky' >> /system/build.prop\""
          adb -s $SERIAL shell "su 0 sh -c \"echo 'ro.build.product=husky' >> /system/build.prop\""
          adb -s $SERIAL shell chmod 644 /system/build.prop
          echo "✅ Pixel 8 Pro profile applied."

          # ------------------------------------------------------------------
          # Install Frida server
          # ------------------------------------------------------------------
          echo "🛠️ Installing Frida server..."
          curl -L -o frida-server-17.1.3-android-x86_64.xz \
            https://github.com/frida/frida/releases/download/17.1.3/frida-server-17.1.3-android-x86_64.xz
          unxz frida-server-17.1.3-android-x86_64.xz
          adb -s $SERIAL push frida-server-17.1.3-android-x86_64 /data/local/tmp/frida-server
          adb -s $SERIAL shell chmod +x /data/local/tmp/frida-server
          adb -s $SERIAL shell "nohup /data/local/tmp/frida-server > /dev/null 2>&1 &"
          sleep 3
          if adb -s $SERIAL shell "ps -A | grep frida-server" | grep -q frida; then
            echo "✅ Frida is running"
          else
            echo "⚠️ Frida not detected, but continuing..."
          fi

          # ------------------------------------------------------------------
          # Start scrcpy-web container
          # ------------------------------------------------------------------
          echo "📱 Starting scrcpy-web container..."
          docker run -d --name scrcpy-web \
            --privileged \
            -p 8000:8000 \
            shmayro/scrcpy-web:latest \
            sh -c "
              for i in {1..30}; do
                if adb connect host.docker.internal:5555 2>/dev/null | grep -q 'connected'; then
                  break
                fi
                sleep 2
              done
              npm start
            "

          echo "⏳ Waiting for web server on port 8000..."
          for i in {1..40}; do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200"; then
              echo "✅ Web server ready"
              break
            fi
            sleep 3
          done
          echo "📋 scrcpy-web logs:"
          docker logs scrcpy-web --tail 20

          # ------------------------------------------------------------------
          # Start NPort tunnel
          # ------------------------------------------------------------------
          echo "🔗 Starting NPort tunnel..."
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          npx nport 8000 -s urban-phone --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          NPORT_PID=$!
          echo $NPORT_PID > nport.pid

          echo "⏳ Waiting for tunnel to be live..."
          for i in {1..60}; do
            if curl -s -o /dev/null -w "%{http_code}" https://urban-phone.nport.link | grep -q "200\|401\|403"; then
              echo "✅ Tunnel live"
              break
            fi
            sleep 5
          done
          TUNNEL_URL="https://urban-phone.nport.link"

          # ------------------------------------------------------------------
          # Display deployment info
          # ------------------------------------------------------------------
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Device: Google Pixel 8 Pro (spoofed)"
          echo "📱 Web Interface: $TUNNEL_URL"
          echo "🔑 Auth: admin:$AUTH_PASS"
          echo "🔌 ADB (fallback): $TUNNEL_URL:5555"
          echo "🔑 Root: Yes (Magisk, ROOT_SETUP completed)"
          echo "🛠️  Frida: Running on emulator (port 27042)"
          echo "================================================"
          echo "To use ADB locally:"
          echo "  adb connect $TUNNEL_URL:5555"
          echo "  adb forward tcp:27042 tcp:27042"
          echo "  frida -H localhost:27042 com.moon.tools -l scripts/hook_zapero.js"

          # ------------------------------------------------------------------
          # Keep alive (sleep until timeout)
          # ------------------------------------------------------------------
          echo "⏳ Keeping emulator alive for 340 minutes..."
          sleep 340m
          SCRIPT

          chmod +x setup.sh

      # ============================================================
      # PHASE 6: START ANDROID EMULATOR AND RUN SETUP SCRIPT
      # ============================================================
      - name: Start Android emulator and run setup
        id: emulator
        uses: reactivecircus/android-emulator-runner@v2
        with:
          api-level: 33
          target: google_apis
          arch: x86_64
          profile: Nexus 5X
          ram-size: 4096
          disk-size: 4096M
          force-avd-creation: false
          disable-linux-hw-accel: false
          emulator-boot-timeout: 600
          emulator-options: >-
            -no-snapshot-load
            -no-snapshot-save
            -no-window
            -gpu swiftshader_indirect
            -noaudio
            -no-boot-anim
            -camera-back none
            -camera-front none
            -memory 4096
            -cores 4
            -writable-system
          disable-animations: true
          script: bash setup.sh

      # ============================================================
      # PHASE 7: SAVE SESSION (if any data was persisted)
      # ============================================================
      - name: Save session
        if: always()
        run: |
          if [ -f ./android-data/data.tar.gz ]; then
            echo "✅ Session data exists"
          else
            echo "⚠️ No session data found to save"
          fi
          if [ "${{ github.event_name == 'workflow_dispatch' && github.event.inputs.encrypt == 'yes' }}" == "true" ] && [ -f ./android-data/data.tar.gz ]; then
            gpg --batch --passphrase "${{ secrets.GPG_PASSPHRASE }}" -c ./android-data/data.tar.gz
            rm -f ./android-data/data.tar.gz
          fi

      - name: Upload session artifact
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data/data.tar.gz*
          retention-days: 90

      # ============================================================
      # PHASE 8: CLEANUP
      # ============================================================
      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker rm -f scrcpy-web 2>/dev/null || true
          docker compose down -v 2>/dev/null || true
