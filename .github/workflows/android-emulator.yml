name: Rooted Android Cloud Phone
on:
  workflow_dispatch:
    inputs:
      persist:
        description: 'Restore previous session?'
        required: true
        default: 'yes'
        type: choice
        options:
          - yes
          - no

permissions:
  contents: read

jobs:
  android:
    runs-on: ubuntu-latest
    timeout-minutes: 350
    steps:
      - uses: actions/checkout@v4

      - name: Install Docker
        run: |
          sudo apt update
          sudo apt install -y docker.io
          sudo systemctl start docker

      - name: Restore previous session
        if: github.event.inputs.persist == 'yes'
        uses: actions/download-artifact@v4
        with:
          name: android-data
          path: ./android-data
        continue-on-error: true

      - name: Start Android emulator (no KVM required)
        run: |
          mkdir -p ./android-data
          docker run -d --name android-emulator \
            --privileged \
            -v $(pwd)/android-data:/data \
            -v $(pwd)/android-data:/home/androidusr \
            -p 5555:5555 \
            -p 8000:8000 \
            shmayro/dockerify-android:latest

      - name: Wait for emulator to boot
        run: |
          echo "⏳ Waiting for emulator to boot (2-3 minutes)..."
          for i in {1..90}; do
            if docker exec android-emulator adb shell getprop sys.boot_completed 2>/dev/null | grep -q "1"; then
              echo "✅ Emulator booted!"
              break
            fi
            echo "⏳ Attempt $i/90..."
            sleep 10
          done

      - name: Install Frida server (x86_64)
        run: |
          docker exec android-emulator bash -c "
            wget -q https://github.com/frida/frida/releases/download/17.1.3/frida-server-17.1.3-android-x86_64.xz
            unxz frida-server-17.1.3-android-x86_64.xz
            chmod +x frida-server-17.1.3-android-x86_64
            mv frida-server-17.1.3-android-x86_64 /data/local/tmp/frida-server
          "
          docker exec -d android-emulator /data/local/tmp/frida-server

      - name: Verify web interface is ready
        run: |
          echo "⏳ Waiting for web interface on port 8000..."
          for i in {1..30}; do
            if docker exec android-emulator curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 | grep -q "200"; then
              echo "✅ Web interface ready!"
              break
            fi
            echo "⏳ Attempt $i/30..."
            sleep 5
          done

      - name: Expose via NPort with authentication
        id: tunnel
        run: |
          AUTH_PASS=$(openssl rand -base64 12 | tr -d '/+=' | head -c 16)
          echo "auth-pass=$AUTH_PASS" >> $GITHUB_OUTPUT
          npx nport 8000 -s urban-phone --auth admin:$AUTH_PASS --language en > nport.log 2>&1 &
          echo $! > nport.pid
          sleep 15
          TUNNEL_URL="https://urban-phone.nport.link"
          echo "tunnel-url=$TUNNEL_URL" >> $GITHUB_OUTPUT

      - name: Display connection info
        run: |
          echo "================================================"
          echo "🌐 ANDROID PHONE IS READY"
          echo "================================================"
          echo "📱 Web Interface: ${{ steps.tunnel.outputs.tunnel-url }}"
          echo "🔑 Auth: admin:${{ steps.tunnel.outputs.auth-pass }}"
          echo "🔌 ADB: adb connect localhost:5555"
          echo "🔑 Root: Yes (Magisk preinstalled)"
          echo "🛠️  Frida: Running on port 27042"
          echo "================================================"

      - name: Keep alive
        run: sleep 340m

      - name: Save session
        uses: actions/upload-artifact@v4
        with:
          name: android-data
          path: ./android-data
          retention-days: 90

      - name: Cleanup
        if: always()
        run: |
          kill $(cat nport.pid) 2>/dev/null || true
          docker stop android-emulator || true
          docker rm android-emulator || true
