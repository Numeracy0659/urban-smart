name: Cloud Android Phone v2

on:
  workflow_dispatch:
    inputs:
      action:
        description: 'Action'
        required: true
        default: 'start'
        type: choice
        options:
          - start
          - stop
      resolution:
        description: 'Screen Resolution'
        required: false
        default: '720x1280'
      ram_mb:
        description: 'RAM (MB)'
        required: false
        default: '4096'
      enable_root:
        description: 'Enable Root (Magisk) — takes 10-15min extra boot time'
        required: false
        default: 'true'
        type: boolean
      enable_gapps:
        description: 'Enable Google Apps (PICO) — takes 10-15min extra boot time'
        required: false
        default: 'false'
        type: boolean
      enable_arm:
        description: 'Enable ARM Translation'
        required: false
        default: 'true'
        type: boolean
      session_hours:
        description: 'Max Session Duration (hours)'
        required: false
        default: '6'

permissions:
  contents: read

jobs:
  start-phone:
    name: Start Cloud Phone
    if: github.event.inputs.action == 'start'
    runs-on: ubuntu-latest
    timeout-minutes: 360

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Enable KVM
        run: |
          sudo chmod 666 /dev/kvm
          echo "KVM enabled"
          ls -la /dev/kvm

      - name: Pull Docker Images
        run: |
          docker pull shmayro/dockerify-android:latest
          docker pull shmayro/scrcpy-web:latest
          echo "Docker images ready"

      - name: Start Android Emulator
        run: |
          docker run -d \
            --name dockerify-android \
            --privileged \
            --device /dev/kvm \
            -p 5555:5555 \
            -e DNS=one.one.one.one \
            -e RAM_SIZE=${{ github.event.inputs.ram_mb }} \
            -e "SCREEN_RESOLUTION=${{ github.event.inputs.resolution }}" \
            -e ROOT_SETUP=$(echo "${{ github.event.inputs.enable_root }}" | tr '[:upper:]' '[:lower:]') \
            -e GAPPS_SETUP=$(echo "${{ github.event.inputs.enable_gapps }}" | tr '[:upper:]' '[:lower:]') \
            -e ARM_TRANSLATION=$(echo "${{ github.event.inputs.enable_arm }}" | tr '[:upper:]' '[:lower:]') \
            shmayro/dockerify-android:latest
          echo "Android emulator starting..."

      - name: Start scrcpy-web
        run: |
          echo "Waiting 30s for emulator to initialize..."
          sleep 30
          docker run -d \
            --name scrcpy-web \
            --privileged \
            -p 8000:8000 \
            --link dockerify-android \
            shmayro/scrcpy-web:latest sh -c \
            "adb connect dockerify-android:5555 && npm start"
          echo "scrcpy-web container started on port 8000"

      - name: Wait for Android Boot
        run: |
          echo "Waiting for Android to boot..."
          BOOT="0"
          for i in $(seq 1 1200); do
            BOOT=$(docker exec dockerify-android adb -s emulator-5555 shell getprop sys.boot_completed 2>/dev/null || echo "0")
            if [ "${BOOT}" = "1" ]; then
              echo "Android boot completed after ${i}s"
              break
            fi
            if [ $((i % 60)) -eq 0 ]; then
              echo "  ... booting (${i}s) — checking status..."
              docker exec dockerify-android adb devices 2>/dev/null || true
              docker logs --since 60s dockerify-android 2>&1 | grep -E "Broadcast completed|Success" || true
            fi
            sleep 1
          done

          if [ "${BOOT}" != "1" ]; then
            echo "::warning::Android boot didn't fully complete in 20 minutes."
            docker logs --tail 50 dockerify-android
          else
            echo "Boot fully successful!"
          fi

      - name: Optimize Android
        run: |
          echo "Disabling animations for smoother experience..."
          docker exec dockerify-android adb shell settings put global window_animation_scale 0 2>/dev/null || true
          docker exec dockerify-android adb shell settings put global transition_animation_scale 0 2>/dev/null || true
          docker exec dockerify-android adb shell settings put global animator_duration_scale 0 2>/dev/null || true
          docker exec dockerify-android adb shell settings put system screen_off_timeout 2147483647 2>/dev/null || true
          echo "Optimizations applied"

      - name: Verify Root Access
        run: |
          echo "=== ROOT VERIFICATION ==="
          echo ""
          echo "--- Checking UID ---"
          docker exec dockerify-android adb shell "cat /proc/self/status | grep Uid"
          echo ""
          echo "--- Checking /system/xbin/su ---"
          docker exec dockerify-android adb shell "ls -la /system/xbin/su 2>/dev/null || ls -la /system/bin/su 2>/dev/null || echo 'su binary not found'"
          echo ""
          echo "--- Checking root with su ---"
          docker exec dockerify-android adb shell "su -c 'whoami' 2>/dev/null || echo 'su not available'"
          echo ""
          echo "--- Checking /system/xbin/magisk ---"
          docker exec dockerify-android adb shell "ls -la /system/xbin/magisk 2>/dev/null || echo 'Magisk not installed'"
          echo ""
          echo "--- System Properties ---"
          docker exec dockerify-android adb shell getprop ro.build.version.release
          docker exec dockerify-android adb shell getprop ro.build.version.security_patch
          docker exec dockerify-android adb shell getprop ro.product.cpu.abi
          docker exec dockerify-android adb shell getprop ro.product.cpu.abilist
          echo ""
          echo "=== ROOT VERIFICATION COMPLETE ==="

      - name: Install Termux
        run: |
          echo "=== INSTALLING TERMUX ==="
          # Download Termux APK from GitHub releases
          TERMUX_VERSION="0.118.1"
          TERMUX_URL="https://github.com/termux/termux-app/releases/download/v${TERMUX_VERSION}/termux-app_v${TERMUX_VERSION}+github-debug_universal.apk"
          echo "Downloading Termux v${TERMUX_VERSION}..."
          curl -L -o /tmp/termux.apk "${TERMUX_URL}" 2>&1 || true
          if [ -f /tmp/termux.apk ] && [ $(stat -c%s /tmp/termux.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
            echo "Installing Termux APK..."
            docker cp /tmp/termux.apk dockerify-android:/data/local/tmp/termux.apk
            docker exec dockerify-android adb shell "pm install /data/local/tmp/termux.apk" 2>&1 || true
            echo "Termux installation complete!"
          else
            echo "Termux download failed, trying F-Droid version..."
            curl -L -o /tmp/termux.apk "https://f-droid.org/repo/com.termux_1018.apk" 2>&1 || true
            if [ -f /tmp/termux.apk ] && [ $(stat -c%s /tmp/termux.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
              docker cp /tmp/termux.apk dockerify-android:/data/local/tmp/termux.apk
              docker exec dockerify-android adb shell "pm install /data/local/tmp/termux.apk" 2>&1 || true
              echo "Termux (F-Droid) installation complete!"
            else
              echo "::warning::Failed to install Termux"
            fi
          fi
          echo "=== TERMUX INSTALLATION COMPLETE ==="

      - name: Install ScreenStream
        run: |
          echo "=== INSTALLING SCREENSTREAM ==="
          # Download ScreenStream from GitHub releases
          SCREENSTREAM_URL="https://github.com/nicehash/NiceHashQuickMiner/releases/download/"
          # Try ScreenStream from GitHub
          curl -L -o /tmp/screenstream.apk "https://github.com/dkrivoruchko/ScreenStream/releases/latest/download/app-debug.apk" 2>&1 || true
          if [ -f /tmp/screenstream.apk ] && [ $(stat -c%s /tmp/screenstream.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
            echo "Installing ScreenStream APK..."
            docker cp /tmp/screenstream.apk dockerify-android:/data/local/tmp/screenstream.apk
            docker exec dockerify-android adb shell "pm install /data/local/tmp/screenstream.apk" 2>&1 || true
            echo "ScreenStream installation complete!"
          else
            echo "::warning::Failed to download ScreenStream. Will try to install via browser."
            echo "Downloading from alternative source..."
            curl -L -o /tmp/screenstream.apk "https://raw.githubusercontent.com/dkrivoruchko/ScreenStream/master/app/build/outputs/apk/debug/app-debug.apk" 2>&1 || true
            if [ -f /tmp/screenstream.apk ] && [ $(stat -c%s /tmp/screenstream.apk 2>/dev/null || echo 0) -gt 1000000 ]; then
              docker cp /tmp/screenstream.apk dockerify-android:/data/local/tmp/screenstream.apk
              docker exec dockerify-android adb shell "pm install /data/local/tmp/screenstream.apk" 2>&1 || true
              echo "ScreenStream installation complete!"
            else
              echo "::warning::ScreenStream download failed from all sources"
            fi
          fi
          echo "=== SCREENSTREAM INSTALLATION COMPLETE ==="

      - name: Configure Android Settings
        run: |
          echo "=== CONFIGURING ANDROID ==="
          # Allow installation from unknown sources
          docker exec dockerify-android adb shell settings put secure install_non_market_apps 1 2>/dev/null || true

          # Allow ScreenStream to draw over other apps
          docker exec dockerify-android adb shell "appops set com.github.dkrivoruchko.screenstream SYSTEM_ALERT_WINDOW allow" 2>/dev/null || true

          # Disable battery optimization for key apps
          docker exec dockerify-android adb shell dumpsys deviceidle whitelist +com.termux 2>/dev/null || true
          docker exec dockerify-android adb shell dumpsys deviceidle whitelist +com.github.dkrivoruchko.screenstream 2>/dev/null || true

          # List installed packages to verify
          echo "--- Installed Packages ---"
          docker exec dockerify-android adb shell "pm list packages | grep -E 'termux|screenstream'"

          echo ""
          echo "=== CONFIGURATION COMPLETE ==="

      - name: Wait for scrcpy-web
        run: |
          echo "Waiting for scrcpy-web to be ready..."
          for i in $(seq 1 120); do
            HTTP_CODE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8000 2>/dev/null || echo "000")
            if [ "${HTTP_CODE}" != "000" ] && [ "${HTTP_CODE}" != "502" ] && [ "${HTTP_CODE}" != "503" ]; then
              echo "scrcpy-web ready (HTTP ${HTTP_CODE})"
              exit 0
            fi
            sleep 3
          done
          echo "::warning::scrcpy-web may not be fully ready, continuing anyway..."

      - name: Create Public Tunnel
        id: expose
        uses: codetalkio/expose-tunnel@v1.5.0
        with:
          service: bore.pub
          port: 8000

      - name: Print Access Information
        run: |
          echo ""
          echo "=========================================="
          echo "  CLOUD ANDROID PHONE IS READY!"
          echo "=========================================="
          echo ""
          echo "  URL: ${{ steps.expose.outputs.tunnel-url }}"
          echo "  Android: API 34 (Android 14)"
          echo "  Resolution: ${{ github.event.inputs.resolution }}"
          echo "  RAM: ${{ github.event.inputs.ram_mb }}MB"
          echo "  Root: ${{ github.event.inputs.enable_root }}"
          echo "  GAPPS: ${{ github.event.inputs.enable_gapps }}"
          echo "  Session: ${{ github.event.inputs.session_hours }} hours max"
          echo ""
          echo "  Shell: ${{ steps.expose.outputs.tunnel-url }}#!action=shell&udid=dockerify-android%3A5555"
          echo ""
          echo "  Open the URL in your browser to use your phone!"
          echo "=========================================="

      - name: Save Access URL as Artifact
        run: |
          mkdir -p /tmp/access-info
          echo "${{ steps.expose.outputs.tunnel-url }}" > /tmp/access-info/url.txt
          echo "" >> /tmp/access-info/url.txt
          echo "Android: API 34 (Android 14)" >> /tmp/access-info/url.txt
          echo "Resolution: ${{ github.event.inputs.resolution }}" >> /tmp/access-info/url.txt
          echo "RAM: ${{ github.event.inputs.ram_mb }}MB" >> /tmp/access-info/url.txt
          echo "Root: ${{ github.event.inputs.enable_root }}" >> /tmp/access-info/url.txt
          echo "GAPPS: ${{ github.event.inputs.enable_gapps }}" >> /tmp/access-info/url.txt
          echo "Session: ${{ github.event.inputs.session_hours }}h max" >> /tmp/access-info/url.txt
          echo "" >> /tmp/access-info/url.txt
          echo "Shell: ${{ steps.expose.outputs.tunnel-url }}#!action=shell&udid=dockerify-android%3A5555" >> /tmp/access-info/url.txt
          echo "" >> /tmp/access-info/url.txt
          echo "Open the URL above in your browser to use your Cloud Android Phone!" >> /tmp/access-info/url.txt
          cat /tmp/access-info/url.txt

      - name: Upload Access URL Artifact
        uses: actions/upload-artifact@v4
        with:
          name: cloud-phone-access-url
          path: /tmp/access-info/
          retention-days: 1

      - name: Keep Session Alive
        run: |
          MAX_SECONDS=$((${{ github.event.inputs.session_hours }} * 3600))
          START_TIME=$(date +%s)
          echo "Session active. Max duration: ${{ github.event.inputs.session_hours }}h"
          echo "Your phone is accessible at: ${{ steps.expose.outputs.tunnel-url }}"
          echo ""
          while true; do
            ELAPSED=$(($(date +%s) - START_TIME))
            REMAINING=$((MAX_SECONDS - ELAPSED))
            if [ "${REMAINING}" -le 0 ]; then
              echo "TIME LIMIT REACHED (${MAX_SECONDS}s). Session ended."
              exit 0
            fi
            BOOT=$(docker exec dockerify-android adb -s emulator-5555 shell getprop sys.boot_completed 2>/dev/null || echo "0")
            HOURS=$((REMAINING / 3600))
            MINUTES=$(((REMAINING % 3600) / 60))
            if [ $((ELAPSED % 600)) -eq 0 ]; then
              echo "[$(date -u)] Status: boot=${BOOT} | remaining=${HOURS}h ${MINUTES}m"
            fi
            sleep 60
          done

  stop-phone:
    name: Stop Cloud Phone
    if: github.event.inputs.action == 'stop'
    runs-on: ubuntu-latest
    steps:
      - name: Stop All Services
        run: |
          echo "Stopping cloud phone..."
          docker stop scrcpy-web 2>/dev/null && docker rm scrcpy-web 2>/dev/null || true
          docker stop dockerify-android 2>/dev/null && docker rm dockerify-android 2>/dev/null || true
          docker system prune -f 2>/dev/null || true
          echo "All services stopped and cleaned up."
